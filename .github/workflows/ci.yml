name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ── Step 1: Lint + Type Check ───────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings policy)
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Step 2: Unit Tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test

  # ── Step 3: Build ────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      # Provide all required env vars for build
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: https://quickcart.in
      NEXT_PUBLIC_APP_URL: https://quickcart.in
      NEXT_PUBLIC_APP_NAME: QuickCart
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
      NEXT_PUBLIC_ALGOLIA_APP_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }}
      NEXT_PUBLIC_ALGOLIA_SEARCH_KEY: ${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_KEY }}
      ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Step 4: Env Placeholder Check ────────────────────────────────────────────
  env-check:
    name: Env Placeholder Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Check for unresolved env placeholders
        run: bash scripts/check-env-placeholders.sh

  # ── Step 5: Bundle Size Gate ─────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size Gate (< 1MB JS)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next/

      - name: Check bundle size
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            const MAX_BYTES = 1024 * 1024; // 1 MB

            function getFileSizeKb(filePath) {
              try {
                return fs.statSync(filePath).size;
              } catch {
                return 0;
              }
            }

            const staticDir = path.join('.next', 'static', 'chunks');
            if (!fs.existsSync(staticDir)) {
              console.log('No chunks directory found — skipping bundle check.');
              process.exit(0);
            }

            const files = fs.readdirSync(staticDir).filter(f => f.endsWith('.js'));
            const totalBytes = files.reduce((sum, f) => sum + getFileSizeKb(path.join(staticDir, f)), 0);
            const totalKb = (totalBytes / 1024).toFixed(1);
            const totalMb = (totalBytes / (1024 * 1024)).toFixed(2);

            console.log('Total JS bundle: ' + totalKb + ' KB (' + totalMb + ' MB)');

            if (totalBytes > MAX_BYTES) {
              console.error('❌ Bundle exceeds 1MB limit! Reduce bundle size.');
              process.exit(1);
            }
            console.log('✅ Bundle is within 1MB limit.');
          "

  # ── Step 6: Accessibility Check ─────────────────────────────────────────────
  accessibility:
    name: Accessibility Audit (axe)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install axe-cli
        run: npm install -g @axe-core/cli

      - name: Start server
        run: |
          npm run build
          npm start &
          sleep 10

      - name: Run axe accessibility audit
        run: |
          axe http://localhost:3000 --exit --tags wcag2a,wcag2aa
          axe http://localhost:3000/search --exit --tags wcag2a,wcag2aa

  # ── Summary ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed ✅
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build, env-check, bundle-size]
    steps:
      - run: echo "All CI checks passed!"
