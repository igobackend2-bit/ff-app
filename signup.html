<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sign Up — Farmers Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Poppins:wght@600;700;800&display=swap"/>
  <link rel="stylesheet" href="css/app.css"/>
  <style>
    body{background:#F5FAF6;font-family:'Nunito',sans-serif;}
    .auth-page{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:24px 16px;}
    .auth-card{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;border:1px solid #E8F0EB;}
    .auth-header{text-align:center;margin-bottom:24px;}
    .auth-logo{font-size:2.8rem;margin-bottom:8px;}
    .auth-header h1{font-family:'Poppins',sans-serif;font-size:1.5rem;font-weight:800;color:#1A2E1F;margin:0 0 4px;}
    .auth-header p{font-size:.88rem;color:#6B8A73;margin:0;}
    .input-group{margin-bottom:14px;}
    .input-label{display:block;font-size:.8rem;font-weight:700;color:#1A2E1F;margin-bottom:5px;}
    .input-field{width:100%;box-sizing:border-box;border:1.5px solid #D4E8DA;border-radius:10px;padding:13px 14px;font-size:.95rem;font-family:'Nunito',sans-serif;color:#1A2E1F;outline:none;transition:border-color .2s;}
    .input-field:focus{border-color:#2E7D4F;}
    .btn-primary{width:100%;padding:14px;background:#2E7D4F;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;font-family:'Poppins',sans-serif;cursor:pointer;transition:background .2s;margin-top:4px;}
    .btn-primary:hover{background:#1B5E35;}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;}
    .auth-alt{text-align:center;font-size:.85rem;color:#6B8A73;margin-top:16px;}
    .auth-alt a{color:#2E7D4F;font-weight:700;text-decoration:none;}
    .otp-info{background:#E8F5EE;border-radius:10px;padding:10px 14px;font-size:.88rem;color:#1B5E35;margin-bottom:16px;text-align:center;}
    .otp-timer{font-size:.82rem;color:#6B8A73;text-align:center;margin-bottom:14px;}
    #countdown{font-weight:700;color:#2E7D4F;}
    .otp-input{font-size:1.5rem;letter-spacing:.3em;text-align:center;}
    .hidden{display:none!important;}
    .shake{animation:shake .5s;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
    #toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
    .toast{background:#2E7D4F;color:#fff;padding:10px 22px;border-radius:20px;font-size:.9rem;font-weight:600;white-space:nowrap;animation:toastIn .3s ease;font-family:'Nunito',sans-serif;}
    .toast.error{background:#E53935;}
    .toast.out{animation:toastOut .3s ease forwards;}
    @keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(10px)}}
  </style>
</head>
<body>
<div id="toast-container"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🌾</div>
      <h1>Farmers Factory</h1>
      <p>Create your account</p>
    </div>

    <!-- Step 1: Details -->
    <div id="step-details">
      <div class="input-group">
        <label class="input-label" for="name">Full Name</label>
        <input class="input-field" id="name" type="text" placeholder="Enter your full name" autocomplete="name"/>
      </div>
      <div class="input-group">
        <label class="input-label" for="phone">Phone Number</label>
        <input class="input-field" id="phone" type="tel" inputmode="numeric" placeholder="10-digit mobile number" maxlength="10"/>
      </div>
      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <input class="input-field" id="email" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <button class="btn-primary" id="btn-send" onclick="handleSendOTP()">Send OTP</button>
      <p class="auth-alt">Already have an account? <a href="login.html">Log in</a></p>
    </div>

    <!-- Step 2: OTP -->
    <div id="step-otp" class="hidden">
      <div class="otp-info" id="otp-info">OTP sent to your email</div>
      <div class="input-group">
        <label class="input-label" for="otp">Enter 6-digit OTP</label>
        <input class="input-field otp-input" id="otp" type="tel" inputmode="numeric" maxlength="6" placeholder="——————" autocomplete="one-time-code" onkeydown="if(event.key==='Enter')handleVerify()"/>
      </div>
      <div class="otp-timer">Expires in <span id="countdown">10:00</span></div>
      <button class="btn-primary" id="btn-verify" onclick="handleVerify()">Create Account</button>
      <p class="auth-alt">
        <a href="#" id="resend-link" onclick="handleResend(event)">Resend OTP</a>
        &nbsp;·&nbsp;
        <a href="#" onclick="goBack(event)">Edit details</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
(function(){
  var u=window.getSession&&window.getSession();
  if(u) window.location.replace('index.html');
})();

var _email='',_name='',_phone='',_timer=null;

function isEmail(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function isPhone(p){return /^\d{10}$/.test(p);}

async function handleSendOTP(){
  var name=document.getElementById('name').value.trim();
  var phone=document.getElementById('phone').value.trim();
  var email=document.getElementById('email').value.trim().toLowerCase();
  if(!name){showToast('Enter your full name','error');return;}
  if(!isPhone(phone)){showToast('Enter a valid 10-digit phone number','error');return;}
  if(!isEmail(email)){showToast('Enter a valid email address','error');return;}
  var btn=document.getElementById('btn-send');
  btn.disabled=true; btn.textContent='Sending…';
  try{
    var chk=await window.db.from('users').select('id').eq('email',email).maybeSingle();
    if(chk.data){showToast('Account already exists. Please log in.','error');btn.disabled=false;btn.textContent='Send OTP';return;}
    var otp=generateOTP();
    var sv=await saveOTP(email,otp);
    if(!sv.success){showToast(sv.error||'Could not generate OTP. Try again.','error');btn.disabled=false;btn.textContent='Send OTP';return;}
    sendOTP(email,otp,name).catch(function(){});
    _email=email; _name=name; _phone=phone;
    document.getElementById('otp-info').innerHTML='OTP sent to <strong>'+email+'</strong>';
    document.getElementById('step-details').classList.add('hidden');
    document.getElementById('step-otp').classList.remove('hidden');
    document.getElementById('otp').focus();
    startTimer(600);
  }catch(e){
    showToast('Something went wrong. Try again.','error');
    btn.disabled=false; btn.textContent='Send OTP';
  }
}

async function handleVerify(){
  var entered=document.getElementById('otp').value.replace(/\D/g,'');
  if(entered.length!==6){showToast('Enter the 6-digit OTP','error');return;}
  var btn=document.getElementById('btn-verify');
  btn.disabled=true; btn.textContent='Creating account…';
  try{
    var res=await verifyOTP(_email,entered);
    if(!res.valid){
      showToast(res.reason||'Invalid or expired OTP','error');
      document.getElementById('otp').classList.add('shake');
      setTimeout(function(){document.getElementById('otp').classList.remove('shake');},600);
      btn.disabled=false; btn.textContent='Create Account'; return;
    }
    await markOTPUsed(res.record.id);
    var ins=await window.db.from('users').insert([{name:_name,phone:_phone,email:_email}]).select().single();
    if(ins.error){showToast('Could not create account. Try again.','error');btn.disabled=false;btn.textContent='Create Account';return;}
    clearInterval(_timer);
    saveSession(ins.data);
    showToast('Welcome to Farmers Factory, '+_name+'! 🌿','success');
    setTimeout(function(){window.location.href='index.html';},1500);
  }catch(e){
    showToast('Something went wrong. Try again.','error');
    btn.disabled=false; btn.textContent='Create Account';
  }
}

async function handleResend(e){
  e.preventDefault();
  var link=document.getElementById('resend-link');
  link.style.pointerEvents='none'; link.textContent='Sending…';
  try{
    var otp=generateOTP();
    var sv=await saveOTP(_email,otp);
    if(sv.success){sendOTP(_email,otp,_name).catch(function(){});showToast('OTP resent','success');clearInterval(_timer);startTimer(600);}
    else showToast('Failed to resend','error');
  }catch(e){showToast('Failed to resend','error');}
  setTimeout(function(){link.style.pointerEvents='';link.textContent='Resend OTP';},3000);
}

function goBack(e){
  e.preventDefault(); clearInterval(_timer);
  document.getElementById('step-otp').classList.add('hidden');
  document.getElementById('step-details').classList.remove('hidden');
  var btn=document.getElementById('btn-send');
  btn.disabled=false; btn.textContent='Send OTP';
  document.getElementById('otp').value='';
}

function startTimer(s){
  clearInterval(_timer);
  var el=document.getElementById('countdown'),rem=s;
  function tick(){
    var m=Math.floor(rem/60),sc=rem%60;
    el.textContent=(m<10?'0':'')+m+':'+(sc<10?'0':'')+sc;
    if(rem<=0){clearInterval(_timer);showToast('OTP expired. Resend to continue.','error');}
    rem--;
  }
  tick(); _timer=setInterval(tick,1000);
}
</script>
</body>
</html>
