<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sign Up — Farmers Factory</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-wrap auth-page">
  <div class="auth-logo">
    <div class="logo-circle">F</div>
  </div>
  <h1 class="auth-title">Create Account</h1>
  <p class="auth-subtitle">Join Farmers Factory for fresh farm delivery</p>

  <div class="auth-card">
    <!-- Step 1: Details -->
    <div id="step1">
      <div class="form-group">
        <label class="form-label" for="fullName">Full Name *</label>
        <input type="text" id="fullName" class="form-input" placeholder="Your full name" autocomplete="name">
        <div class="form-error" id="nameErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email Address *</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" autocomplete="email">
        <div class="form-error" id="emailErr"></div>
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Phone Number *</label>
        <input type="tel" id="phone" class="form-input" placeholder="10-digit mobile number" maxlength="10" autocomplete="tel">
        <div class="form-error" id="phoneErr"></div>
      </div>
      <button class="btn btn-primary" id="sendOtpBtn" style="margin-top:4px">Send OTP →</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="step2" style="display:none;text-align:center">
      <p style="font-size:14px;color:var(--text-2);margin-bottom:4px">OTP sent to</p>
      <p style="font-size:15px;font-weight:800;color:var(--text-1);margin-bottom:20px" id="otpEmailDisplay"></p>
      <div class="otp-group" id="otpGroup">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
      </div>
      <div class="form-error" id="otpErr" style="text-align:center;margin-bottom:12px"></div>
      <button class="btn btn-primary" id="verifyBtn">Verify & Create Account</button>
      <button class="btn btn-outline" id="resendBtn" style="margin-top:10px" disabled>Resend OTP (60s)</button>
    </div>

    <p style="text-align:center;font-size:13px;color:var(--text-3);margin-top:16px">
      Already have an account? <a href="/login.html" style="color:var(--primary);font-weight:700">Login</a>
    </p>
  </div>
</div>
<div class="toast-container"></div>

<script type="module">
import { sendOTP, verifyOTP, signUp, setupOTPInputs } from "/js/auth.js";
import { showToast } from "/js/utils.js";
import { isValidEmail, isValidPhone } from "/js/utils.js";

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const otpHelper = setupOTPInputs(document.getElementById("otpGroup"));

let resendTimer;

// ── Step 1: Send OTP ────────────────────────────
document.getElementById("sendOtpBtn").addEventListener("click", async () => {
  const name  = document.getElementById("fullName").value.trim();
  const email = document.getElementById("email").value.trim();
  const phone = document.getElementById("phone").value.trim();
  let valid = true;

  document.getElementById("nameErr").textContent  = "";
  document.getElementById("emailErr").textContent = "";
  document.getElementById("phoneErr").textContent = "";

  if (!name) { document.getElementById("nameErr").textContent = "Full name is required"; valid = false; }
  if (!isValidEmail(email)) { document.getElementById("emailErr").textContent = "Enter a valid email address"; valid = false; }
  if (!isValidPhone(phone)) { document.getElementById("phoneErr").textContent = "Enter a valid 10-digit mobile number"; valid = false; }
  if (!valid) return;

  const btn = document.getElementById("sendOtpBtn");
  btn.disabled = true;
  btn.textContent = "Sending OTP…";

  const { success, error } = await sendOTP(email);
  if (!success) { showToast(error || "Failed to send OTP", "error"); btn.disabled = false; btn.textContent = "Send OTP →"; return; }

  step1.style.display = "none";
  step2.style.display = "block";
  document.getElementById("otpEmailDisplay").textContent = email;
  otpHelper.focus();
  showToast("OTP sent to " + email, "success");
  startResendTimer();
});

// ── Step 2: Verify OTP ──────────────────────────
document.getElementById("verifyBtn").addEventListener("click", async () => {
  const otp   = otpHelper.getValue();
  const email = document.getElementById("email").value.trim();
  const errEl = document.getElementById("otpErr");
  errEl.textContent = "";

  if (otp.length !== 6) { errEl.textContent = "Please enter the 6-digit OTP"; return; }

  const btn = document.getElementById("verifyBtn");
  btn.disabled = true;
  btn.textContent = "Verifying…";

  const { valid, error: otpErr } = await verifyOTP(email, otp);
  if (!valid) { errEl.textContent = otpErr || "Invalid OTP"; btn.disabled = false; btn.textContent = "Verify & Create Account"; return; }

  // Create account
  const { success, error: signErr } = await signUp(
    document.getElementById("fullName").value.trim(),
    email,
    document.getElementById("phone").value.trim(),
  );
  if (!success) { errEl.textContent = signErr || "Failed to create account"; btn.disabled = false; btn.textContent = "Verify & Create Account"; return; }

  showToast("🎉 Account created! Please login.", "success");
  setTimeout(() => window.location.href = "/login.html", 1200);
});

// ── Resend ──────────────────────────────────────
function startResendTimer() {
  let sec = 60;
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;
  resendTimer = setInterval(() => {
    sec--;
    btn.textContent = sec > 0 ? \`Resend OTP (\${sec}s)\` : "Resend OTP";
    if (sec <= 0) { clearInterval(resendTimer); btn.disabled = false; }
  }, 1000);
}

document.getElementById("resendBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  await sendOTP(email);
  otpHelper.clear();
  otpHelper.focus();
  showToast("New OTP sent to " + email, "success");
  startResendTimer();
  document.getElementById("resendBtn").disabled = true;
});
</script>
</body>
</html>
