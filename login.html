<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Login — Farmers Factory</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-wrap auth-page">
  <div class="auth-logo">
    <div class="logo-circle">F</div>
  </div>
  <h1 class="auth-title">Welcome Back!</h1>
  <p class="auth-subtitle">Login with your email OTP</p>

  <div class="auth-card">
    <!-- Step 1: Email -->
    <div id="step1">
      <div class="form-group">
        <label class="form-label" for="email">Email Address *</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" autocomplete="email">
        <div class="form-error" id="emailErr"></div>
      </div>
      <button class="btn btn-primary" id="sendOtpBtn">Send OTP →</button>
    </div>

    <!-- Step 2: OTP -->
    <div id="step2" style="display:none;text-align:center">
      <p style="font-size:14px;color:var(--text-2);margin-bottom:4px">OTP sent to</p>
      <p style="font-size:15px;font-weight:800;margin-bottom:20px" id="otpEmailDisplay"></p>
      <div class="otp-group" id="otpGroup">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
        <input class="otp-input" maxlength="1" inputmode="numeric" type="text">
      </div>
      <div class="form-error" id="otpErr" style="text-align:center;margin-bottom:12px"></div>
      <button class="btn btn-primary" id="loginBtn">Login →</button>
      <button class="btn btn-outline" id="resendBtn" style="margin-top:10px" disabled>Resend OTP (60s)</button>
      <button class="btn" id="changeEmailBtn" style="margin-top:8px;color:var(--text-3);font-size:13px">← Change email</button>
    </div>

    <p style="text-align:center;font-size:13px;color:var(--text-3);margin-top:16px">
      New user? <a href="/signup.html" style="color:var(--primary);font-weight:700">Create Account</a>
    </p>
  </div>
</div>
<div class="toast-container"></div>

<script type="module">
import { sendOTP, verifyOTP, loginUser, setupOTPInputs } from "/js/auth.js";
import { showToast, isValidEmail } from "/js/utils.js";
import { getSession } from "/js/supabase.js";

// Redirect if already logged in
if (getSession()) window.location.href = "/";

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");
const otpHelper = setupOTPInputs(document.getElementById("otpGroup"));

let resendTimer;

document.getElementById("sendOtpBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const errEl = document.getElementById("emailErr");
  errEl.textContent = "";

  if (!isValidEmail(email)) { errEl.textContent = "Enter a valid email address"; return; }

  const btn = document.getElementById("sendOtpBtn");
  btn.disabled = true; btn.textContent = "Sending…";

  const { success, error } = await sendOTP(email);
  if (!success) { showToast(error || "Failed to send OTP", "error"); btn.disabled = false; btn.textContent = "Send OTP →"; return; }

  step1.style.display = "none";
  step2.style.display = "block";
  document.getElementById("otpEmailDisplay").textContent = email;
  otpHelper.focus();
  showToast("OTP sent to " + email, "success");
  startResendTimer();
});

document.getElementById("loginBtn").addEventListener("click", async () => {
  const otp   = otpHelper.getValue();
  const email = document.getElementById("email").value.trim();
  const errEl = document.getElementById("otpErr");
  errEl.textContent = "";

  if (otp.length !== 6) { errEl.textContent = "Please enter the 6-digit OTP"; return; }

  const btn = document.getElementById("loginBtn");
  btn.disabled = true; btn.textContent = "Verifying…";

  const { valid, error: otpErr } = await verifyOTP(email, otp);
  if (!valid) { errEl.textContent = otpErr || "Invalid or expired OTP"; btn.disabled = false; btn.textContent = "Login →"; return; }

  const { success, user, error: loginErr } = await loginUser(email);
  if (!success) { errEl.textContent = loginErr || "Login failed"; btn.disabled = false; btn.textContent = "Login →"; return; }

  showToast("👋 Welcome back, " + user.name + "!", "success");
  setTimeout(() => window.location.href = "/", 900);
});

document.getElementById("changeEmailBtn").addEventListener("click", () => {
  step2.style.display = "none";
  step1.style.display = "block";
  clearInterval(resendTimer);
  otpHelper.clear();
});

function startResendTimer() {
  let sec = 60;
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;
  resendTimer = setInterval(() => {
    sec--;
    btn.textContent = sec > 0 ? \`Resend OTP (\${sec}s)\` : "Resend OTP";
    if (sec <= 0) { clearInterval(resendTimer); btn.disabled = false; }
  }, 1000);
}

document.getElementById("resendBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  await sendOTP(email);
  otpHelper.clear(); otpHelper.focus();
  showToast("New OTP sent", "success");
  document.getElementById("resendBtn").disabled = true;
  startResendTimer();
});
</script>
</body>
</html>
