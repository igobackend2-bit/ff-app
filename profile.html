<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Profile — Farmers Factory</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-wrapper">
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <h1 class="page-title">My Profile</h1>
    <a href="cart.html" class="icon-btn">🛒<span class="badge cart-badge" style="display:none">0</span></a>
  </header>

  <!-- Avatar -->
  <div style="text-align:center;padding:24px 16px 16px">
    <div class="avatar-circle" id="avatar">?</div>
  </div>

  <!-- Profile Card -->
  <div class="card">
    <!-- View mode -->
    <div id="view-mode">
      <div class="flex-between" style="margin-bottom:16px">
        <span style="font-weight:700;font-size:16px">Profile Details</span>
        <button class="btn btn-outline" style="padding:6px 16px;font-size:13px" id="edit-btn">Edit</button>
      </div>
      <div style="margin-bottom:10px">
        <div class="text-muted">Full Name</div>
        <div style="font-weight:700;font-size:15px" id="name-val">—</div>
      </div>
      <div style="margin-bottom:10px">
        <div class="text-muted">Email</div>
        <div style="font-weight:700;font-size:15px" id="email-val">—</div>
      </div>
      <div>
        <div class="text-muted">Phone</div>
        <div style="font-weight:700;font-size:15px" id="phone-val">—</div>
      </div>
    </div>

    <!-- Edit mode -->
    <div id="edit-mode" class="hidden">
      <div style="font-weight:700;font-size:16px;margin-bottom:16px">Edit Profile</div>
      <div class="form-group">
        <label class="form-label" for="name-input">Full Name</label>
        <input type="text" id="name-input">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" value="" disabled style="background:var(--bg);color:var(--text-3)" id="email-display">
        <div style="font-size:11px;color:var(--text-3);margin-top:4px">Email cannot be changed</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="phone-input">Phone Number</label>
        <input type="tel" id="phone-input" maxlength="10">
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1" id="save-btn">Save Changes</button>
        <button class="btn btn-outline" style="flex:1" id="cancel-edit-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Orders section -->
  <div style="padding:0 16px;margin-bottom:8px">
    <h3 style="font-size:16px;font-weight:800">My Orders</h3>
  </div>
  <div id="orders-list" style="padding:0 16px 16px"></div>

  <!-- Logout -->
  <div style="padding:0 16px 32px">
    <button class="btn btn-outline btn-block" id="logout-btn" style="border-color:var(--danger);color:var(--danger)">
      Logout
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html"   class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="wishlist.html" class="nav-item"><span class="nav-icon">🤍</span><span>Wishlist</span></a>
  <a href="cart.html"    class="nav-item"><span class="nav-icon">🛒</span><span>Cart</span></a>
  <a href="orders.html"  class="nav-item"><span class="nav-icon">📦</span><span>Orders</span></a>
  <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
</nav>

<script type="module">
import { initProfile } from './js/profile.js';
import { syncBadges } from './js/cart.js';

syncBadges();

// Cancel edit
document.getElementById('cancel-edit-btn')?.addEventListener('click', () => {
  document.getElementById('edit-mode').classList.add('hidden');
  document.getElementById('view-mode').classList.remove('hidden');
});

initProfile();
</script>
</body>
</html>
