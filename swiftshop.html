<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SwiftShop — 24-Hour Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────────────────
   RESET & TOKENS
───────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06091a;--bg2:#0b1020;--bg3:#121829;
  --card:#141e33;--card2:#1c2845;--border:#243254;
  --acc:#6c63ff;--acc-l:#a695ff;--acc-d:#4e47cc;
  --acc-g:rgba(108,99,255,.25);
  --txt:#e8edf8;--txt2:#8fa0c0;--txt3:#4d5f7c;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;
  --r:14px;--rs:8px;
  --sh:0 4px 30px rgba(0,0,0,.55);
  --sha:0 0 30px var(--acc-g);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Syne',sans-serif}
button,input,select,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ─────────────────────────────────────────────────────────
   LAYOUT HELPERS
───────────────────────────────────────────────────────── */
.page{padding:16px;padding-bottom:56px;max-width:540px;margin:0 auto}
.pb50{padding-bottom:50px}

/* ─────────────────────────────────────────────────────────
   SCREEN ANIMATION
───────────────────────────────────────────────────────── */
.fade{animation:fade .28s ease forwards}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ─────────────────────────────────────────────────────────
   NAV
───────────────────────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:600;
  background:rgba(6,9,26,.93);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;gap:8px;
}
.nav-logo{
  font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;
  background:linear-gradient(135deg,#6c63ff,#b39dff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.nav-logo em{-webkit-text-fill-color:var(--txt);font-weight:300;font-style:normal}
.nav-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.nbtn{
  padding:7px 14px;border-radius:20px;border:1.5px solid var(--acc);
  background:transparent;color:var(--acc);font-size:.8rem;font-weight:600;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.nbtn:hover{background:var(--acc);color:#fff}
.nbtn.ghost{border-color:var(--border);color:var(--txt2);font-size:.76rem}
.nbtn.ghost:hover{border-color:var(--acc);color:var(--acc);background:transparent}
.nbtn.red{border-color:var(--err);color:var(--err)}
.nbtn.red:hover{background:var(--err);color:#fff}
.nu{
  display:flex;align-items:center;gap:7px;cursor:pointer;
  background:var(--card2);border:1px solid var(--border);
  border-radius:22px;padding:4px 12px 4px 4px;transition:border-color .2s;
}
.nu:hover{border-color:var(--acc)}
.nu-name{font-size:.82rem;font-weight:600;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.back-btn{
  display:flex;align-items:center;gap:5px;
  background:var(--card2);border:1px solid var(--border);
  color:var(--txt2);padding:7px 13px;border-radius:20px;
  font-size:.82rem;cursor:pointer;transition:all .2s;white-space:nowrap;
}
.back-btn:hover{border-color:var(--acc);color:var(--acc)}

/* ─────────────────────────────────────────────────────────
   AVATAR
───────────────────────────────────────────────────────── */
.av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),#b39dff);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;color:#fff;font-family:'Syne',sans-serif;
}
.av-lg{
  width:76px;height:76px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),#b39dff);
  display:flex;align-items:center;justify-content:center;
  font-size:1.65rem;font-weight:800;color:#fff;font-family:'Syne',sans-serif;
  margin:0 auto 14px;box-shadow:var(--sha);
}

/* ─────────────────────────────────────────────────────────
   BANNER
───────────────────────────────────────────────────────── */
.banner{
  background:linear-gradient(135deg,var(--acc-d),var(--acc));
  color:#fff;text-align:center;padding:9px 16px;
  font-size:.82rem;font-weight:600;letter-spacing:.3px;
}

/* ─────────────────────────────────────────────────────────
   CARD
───────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card+.card,.card+.mt{margin-top:12px}

/* ─────────────────────────────────────────────────────────
   PRODUCT GRID
───────────────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px 16px 54px}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
.pcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;position:relative;
  transition:transform .18s,box-shadow .18s,border-color .18s;
}
.pcard:not(.oos):hover{transform:translateY(-4px);box-shadow:var(--sha);border-color:var(--acc)}
.pcard.oos{cursor:not-allowed;opacity:.64}
.pcard-img{
  font-size:3.2rem;background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  min-height:90px;padding:18px 8px 10px;
}
.pcard-body{padding:10px 12px 13px}
.pcard-name{font-size:.87rem;font-weight:600;line-height:1.3;margin-bottom:4px;font-family:'Syne',sans-serif}
.pcard-price{font-size:.96rem;font-weight:800;color:var(--acc-l);font-family:'Syne',sans-serif}
.oos-pill{
  position:absolute;top:8px;right:8px;
  background:var(--err);color:#fff;
  font-size:.62rem;font-weight:700;padding:3px 8px;border-radius:20px;
}

/* ─────────────────────────────────────────────────────────
   BUTTONS
───────────────────────────────────────────────────────── */
.btn{
  width:100%;padding:14px 20px;border-radius:var(--r);border:none;
  font-size:.96rem;font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn:not(:disabled):active{transform:scale(.98)}
.btn-pri{background:linear-gradient(135deg,var(--acc),var(--acc-l));color:#fff;box-shadow:0 4px 18px var(--acc-g)}
.btn-pri:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--acc-g)}
.btn-out{background:transparent;border:1.5px solid var(--acc);color:var(--acc)}
.btn-out:not(:disabled):hover{background:var(--acc);color:#fff}
.btn-sm{padding:8px 15px;font-size:.8rem;width:auto;border-radius:var(--rs)}
.spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─────────────────────────────────────────────────────────
   FORM
───────────────────────────────────────────────────────── */
.fg{margin-bottom:15px}
.fg:last-child{margin-bottom:0}
.lbl{display:block;font-size:.73rem;font-weight:600;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp{
  width:100%;padding:12px 13px;background:var(--bg3);
  border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--txt);font-size:.93rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(108,99,255,.14)}
.inp.err-inp{border-color:var(--err)}
.inp[readonly]{opacity:.58;cursor:not-allowed}
.ph-wrap{display:flex}
.ph-pre{
  padding:12px 11px;background:var(--card2);
  border:1.5px solid var(--border);border-right:none;
  border-radius:var(--rs) 0 0 var(--rs);
  color:var(--acc-l);font-weight:600;font-size:.93rem;
  display:flex;align-items:center;white-space:nowrap;flex-shrink:0;
}
.ph-wrap .inp{border-radius:0 var(--rs) var(--rs) 0}
.ferr{color:var(--err);font-size:.77rem;margin-top:4px;display:none}
.ferr.show{display:block}

/* ─────────────────────────────────────────────────────────
   OTP BOXES
───────────────────────────────────────────────────────── */
.otp-row{display:flex;gap:9px;justify-content:center;margin:18px 0}
.otp-inp{
  width:44px;height:52px;text-align:center;
  font-size:1.35rem;font-weight:800;font-family:'Syne',sans-serif;
  background:var(--bg3);border:2px solid var(--border);border-radius:10px;
  color:var(--txt);outline:none;transition:border-color .2s,box-shadow .2s;caret-color:var(--acc);
}
.otp-inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(108,99,255,.17)}
.otp-inp.filled{border-color:var(--acc);background:rgba(108,99,255,.1)}
.otp-inp.shake{border-color:var(--err);animation:shk .35s ease}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* ─────────────────────────────────────────────────────────
   TABS
───────────────────────────────────────────────────────── */
.tabs{display:flex;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:14px}
.tab{
  flex:1;padding:8px;background:transparent;border:none;
  color:var(--txt3);font-size:.84rem;font-weight:600;
  border-radius:6px;cursor:pointer;transition:all .2s;
}
.tab.on{background:var(--acc);color:#fff;box-shadow:0 2px 10px var(--acc-g)}

/* ─────────────────────────────────────────────────────────
   TOASTS
───────────────────────────────────────────────────────── */
#toasts{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:9000;display:flex;flex-direction:column;gap:8px;
  width:92%;max-width:380px;pointer-events:none;
}
.toast{
  padding:12px 17px;border-radius:var(--rs);font-size:.87rem;font-weight:600;
  text-align:center;pointer-events:all;box-shadow:0 4px 20px rgba(0,0,0,.45);
  animation:tin .28s ease;
}
.toast.s{background:var(--ok);color:#fff}
.toast.e{background:var(--err);color:#fff}
.toast.i{background:var(--acc);color:#fff}
.toast.w{background:var(--warn);color:#111}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─────────────────────────────────────────────────────────
   STATUS PILLS
───────────────────────────────────────────────────────── */
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:.73rem;font-weight:700}
.pill-blue{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.pill-yel {background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.pill-pur {background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.25)}
.pill-grn {background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}

/* ─────────────────────────────────────────────────────────
   DELIVERY INFO STRIP
───────────────────────────────────────────────────────── */
.dstrip{
  display:flex;align-items:center;gap:9px;padding:11px 13px;
  background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.18);
  border-radius:var(--rs);margin:12px 0;font-size:.85rem;
  color:#4ade80;font-weight:500;
}

/* ─────────────────────────────────────────────────────────
   ORDER SUMMARY ROWS
───────────────────────────────────────────────────────── */
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:.9rem}
.srow.total{font-size:.97rem;font-weight:700;border-top:1px solid var(--border);margin-top:4px;padding-top:11px}
.free-tag{color:var(--ok);font-weight:600;font-size:.83rem}
.div{height:1px;background:var(--border);margin:13px 0}

/* ─────────────────────────────────────────────────────────
   SMS BUBBLE
───────────────────────────────────────────────────────── */
.sms{
  background:var(--card2);border:1px solid var(--border);
  border-radius:12px 12px 12px 3px;padding:12px 15px;margin:12px 0;
}
.sms-from{font-size:.67rem;color:var(--acc-l);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.sms-body{font-size:.88rem;color:var(--txt2);line-height:1.55}
.sms-code{display:block;font-size:1.4rem;font-weight:800;color:var(--acc-l);letter-spacing:6px;font-family:'Syne',sans-serif;margin:6px 0 4px}

/* ─────────────────────────────────────────────────────────
   TIMER & RESEND
───────────────────────────────────────────────────────── */
.timer-row{text-align:center;font-size:.84rem;color:var(--txt2);margin-top:10px}
.timer-v{color:var(--acc-l);font-weight:700}
.resend-row{text-align:center;margin-top:10px}
.resend-btn{background:none;border:none;color:var(--acc-l);font-size:.84rem;font-weight:600;cursor:pointer;text-decoration:underline;font-family:'DM Sans',sans-serif}

/* ─────────────────────────────────────────────────────────
   PRODUCT DETAIL
───────────────────────────────────────────────────────── */
.big-emoji{
  background:var(--card2);border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:7.5rem;height:200px;margin-bottom:15px;
}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600;background:rgba(108,99,255,.14);color:var(--acc-l)}

/* ─────────────────────────────────────────────────────────
   ORDER CONFIRMED
───────────────────────────────────────────────────────── */
.success-ring{
  width:82px;height:82px;border-radius:50%;
  background:linear-gradient(135deg,var(--ok),#16a34a);
  display:flex;align-items:center;justify-content:center;font-size:2.3rem;
  margin:0 auto 16px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 0 44px rgba(34,197,94,.38);
}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* ─────────────────────────────────────────────────────────
   ETA CARD
───────────────────────────────────────────────────────── */
.eta{
  background:linear-gradient(135deg,rgba(108,99,255,.14),rgba(108,99,255,.04));
  border:1px solid var(--acc);border-radius:var(--r);
  padding:16px;text-align:center;margin-bottom:14px;
}
.eta-val{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;color:var(--acc-l)}
.eta-lbl{font-size:.82rem;color:var(--txt2);margin-top:3px}

/* ─────────────────────────────────────────────────────────
   MAP
───────────────────────────────────────────────────────── */
.map-box{border-radius:var(--r);overflow:hidden;border:1px solid var(--border);background:#06101e;margin-bottom:14px}
.map-box svg{display:block;width:100%;height:auto}

/* ─────────────────────────────────────────────────────────
   PROGRESS STEPS
───────────────────────────────────────────────────────── */
.steps{}
.step-row{display:flex;align-items:flex-start;gap:11px;padding:8px 0;position:relative}
.step-row:not(:last-child)::after{content:'';position:absolute;left:12px;top:30px;width:2px;height:calc(100% + 2px);background:var(--border)}
.step-row.s-done:not(:last-child)::after{background:var(--ok)}
.step-dot{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;z-index:1;
  background:var(--bg3);border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;
}
.step-dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.step-dot.active{background:var(--acc);border-color:var(--acc);color:#fff;animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,.5)}50%{box-shadow:0 0 0 9px rgba(108,99,255,0)}}
.step-info{flex:1;padding-top:2px}
.step-title{font-size:.88rem;font-weight:600}
.step-title.dim{color:var(--txt3)}
.step-time{font-size:.74rem;color:var(--txt3);margin-top:1px}

/* ─────────────────────────────────────────────────────────
   LIVE DOT
───────────────────────────────────────────────────────── */
.live-dot{width:8px;height:8px;background:var(--ok);border-radius:50%;display:inline-block;margin-right:5px;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ─────────────────────────────────────────────────────────
   ADMIN STATS
───────────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 15px}
.stat-val{font-family:'Syne',sans-serif;font-size:1.65rem;font-weight:800;color:var(--acc-l)}
.stat-lbl{font-size:.73rem;color:var(--txt3);margin-top:2px}

/* ─────────────────────────────────────────────────────────
   ADMIN EMOJI PICKER
───────────────────────────────────────────────────────── */
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px}
.emo{
  font-size:1.35rem;text-align:center;padding:7px;
  border-radius:7px;background:var(--bg3);border:2px solid transparent;
  cursor:pointer;transition:all .15s;
}
.emo:hover{border-color:var(--acc);background:rgba(108,99,255,.1)}
.emo.sel{border-color:var(--acc);background:rgba(108,99,255,.2)}

/* ─────────────────────────────────────────────────────────
   ADMIN PRODUCT & ORDER ROWS
───────────────────────────────────────────────────────── */
.adm-prod-row{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--border)}
.adm-prod-row:last-child{border-bottom:none}
.adm-order{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:13px;margin-bottom:9px}
.status-sel{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--rs);color:var(--txt);padding:7px 10px;
  cursor:pointer;outline:none;margin-top:8px;font-size:.83rem;
  -webkit-appearance:none;appearance:none;
}
.status-sel:focus{border-color:var(--acc)}

/* ─────────────────────────────────────────────────────────
   ORDER CARDS (ACCOUNT)
───────────────────────────────────────────────────────── */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:9px;transition:border-color .2s}
.order-card:hover{border-color:var(--acc)}
.empty{text-align:center;padding:38px 20px}
.empty-icon{font-size:2.8rem;margin-bottom:10px}
</style>
</head>

const $ = id => document.getElementById(id);

function uid(){ return "ORD" + Date.now().toString().slice(-8) }

function toast(msg, type="i"){
  const c=$("toasts"); if(!c) return;
  const d=document.createElement("div");
  d.className=`toast ${type}`; d.textContent=msg; c.appendChild(d);
  setTimeout(()=>{ d.style.opacity="0"; d.style.transition="opacity .4s";
    setTimeout(()=>d.remove(),420); },3400);
}

/* navigate */
function go(scr, fromScr){
  ST.prev = (fromScr !== undefined) ? fromScr : ST.screen;
  ST.screen = scr;
  cancelAnim(); stopPoll();
  render();
  window.scrollTo({top:0,behavior:"instant"});
}
function back(){ go(ST.prev) }

function initials(){
  if(!ST.user) return "?";

  return (p.length>=2 ? p[0][0]+p[p.length-1][0] : p[0].slice(0,2)).toUpperCase();

/* ── SEND OTP ── */
function sendOTP(){
  const name  = ($("L_name")||{}).value?.trim()||"";
  const phone = ($("L_phone")||{}).value?.trim()||"";
  let ok = true;

  if(name.length<2){
    $("E_name").classList.add("show");
    $("L_name").classList.add("err-inp"); ok=false;
  } else { $("E_name").classList.remove("show"); $("L_name").classList.remove("err-inp") }

  if(!/^\d{10}$/.test(phone)){
    $("E_phone").classList.add("show");
    $("L_phone").classList.add("err-inp"); ok=false;
  } else { $("E_phone").classList.remove("show"); $("L_phone").classList.remove("err-inp") }

  if(!ok) return;

  const code = String(Math.floor(100000 + Math.random()*900000));
  ST.otpData = { code, name, phone, exp:Date.now()+120000, tid:null, cd:120 };

  /* show step 2 */
  $("step2").style.display = "block";
  $("SMS_box").style.display = "block";
  $("SMS_code").textContent  = code;
  $("otp_sub").textContent   = `OTP sent to +91 ${phone.slice(0,5)}XXXXX`;
  $("B_sendOtp").textContent = "✅ OTP Sent";
  $("B_sendOtp").disabled    = true;

  wireOTPBoxes();
  startOTPTimer();
  toast(`OTP sent! (Demo — see SMS bubble below)`, "s");
  setTimeout(()=>{ $("step2").scrollIntoView({behavior:"smooth",block:"nearest"}) },220);
  document.querySelector(".otp-inp[data-idx='0']")?.focus();
}

/* ── WIRE OTP BOXES ── */
function wireOTPBoxes(){
  const boxes = document.querySelectorAll(".otp-inp");
  boxes.forEach(b => {
    b.value = ""; b.classList.remove("filled","shake");
    b.oninput = e => {
      const v = e.target.value.replace(/\D/g,"");
      e.target.value = v ? v[0] : "";
      e.target.classList.toggle("filled", !!v);
      e.target.classList.remove("shake");
      if(v){
        const nx = document.querySelector(`.otp-inp[data-idx="${+e.target.dataset.idx+1}"]`);
        if(nx) nx.focus();
      }
      checkOTPFull();
    };
    b.onkeydown = e => {
      if(e.key==="Backspace" && !b.value){
        const pr = document.querySelector(`.otp-inp[data-idx="${+b.dataset.idx-1}"]`);
        if(pr){ pr.value=""; pr.classList.remove("filled"); pr.focus(); checkOTPFull() }
      }
    };
    b.onpaste = e => {
      e.preventDefault();
      const txt = (e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"").slice(0,6);
      boxes.forEach((bx,i)=>{ if(txt[i]){ bx.value=txt[i]; bx.classList.add("filled") }});
      checkOTPFull();
    };
  });
}

function getOTPValue(){ return [...document.querySelectorAll(".otp-inp")].map(b=>b.value).join("") }

function checkOTPFull(){
  const full = [...document.querySelectorAll(".otp-inp")].every(b=>b.value.length===1);
  const vbtn = $("B_verify"); if(vbtn) vbtn.disabled = !full;
  if(full) setTimeout(verifyOTP, 80);
}

/* ── TIMER ── */
function startOTPTimer(){
  ST.otpData.cd = 120; clearOTPTimer();
  ST.otpData.tid = setInterval(()=>{
    ST.otpData.cd--;
    const tv=$("TMR_val"); if(!tv){ clearOTPTimer(); return }
    if(ST.otpData.cd <= 0){
      clearOTPTimer();
      const tr=$("TMR_row"); if(tr) tr.style.display="none";
      const rr=$("RSN_row"); if(rr) rr.style.display="block";
      return;
    }
    tv.textContent = `${Math.floor(ST.otpData.cd/60)}:${String(ST.otpData.cd%60).padStart(2,"0")}`;
  }, 1000);
}
function clearOTPTimer(){ if(ST.otpData.tid){ clearInterval(ST.otpData.tid); ST.otpData.tid=null } }

function resendOTP(){
  const c = String(Math.floor(100000+Math.random()*900000));
  ST.otpData.code=c; ST.otpData.exp=Date.now()+120000;
  $("SMS_code").textContent=c;
  $("OTP_err").style.display="none";
  $("RSN_row").style.display="none";
  $("TMR_row").style.display="block";
  document.querySelectorAll(".otp-inp").forEach(b=>{ b.value=""; b.classList.remove("filled","shake") });
  const vb=$("B_verify"); if(vb) vb.disabled=true;
  startOTPTimer(); toast("New OTP sent!","i");
}

/* ── VERIFY OTP ── */
function verifyOTP(){
  const entered = getOTPValue(); if(entered.length!==6) return;
  if(Date.now()>ST.otpData.exp){ showOTPErr("⏰ OTP expired. Please resend."); return }
  if(entered===ST.otpData.code){
    clearOTPTimer();
    ST.user = { name:ST.otpData.name, phone:ST.otpData.phone };
    toast(`Welcome, ${firstName()}! 🎉`, "s");
    const dest=ST.loginReturn; ST.loginReturn="home";
    if(dest==="checkout" && ST.selProduct) go("checkout","detail");
    else go(dest||"home","home");
  } else {
    showOTPErr("❌ Incorrect OTP. Try again.");
    document.querySelectorAll(".otp-inp").forEach(b=>b.classList.add("shake"));
    setTimeout(()=>{
      document.querySelectorAll(".otp-inp").forEach(b=>{ b.value=""; b.classList.remove("filled","shake") });
      const vb=$("B_verify"); if(vb) vb.disabled=true;
      document.querySelector(".otp-inp[data-idx='0']")?.focus();
    }, 900);
  }
}
function showOTPErr(m){ const e=$("OTP_err"); if(e){ e.textContent=m; e.style.display="block" } }

function detectLocation(){

  if(btn){ btn.innerHTML='<span class="spin"></span> Detecting…'; btn.disabled=true }
  const done = addr => {
    ST.checkout.liveAddr=addr;
    if(inp) inp.value=addr;
    if(btn){ btn.innerHTML="✅ Location Detected"; btn.disabled=false }
    toast("Location detected!","s");
  };
  const fail = ()=>{
    done("T. Nagar, Chennai, Tamil Nadu — 600017");
    toast("Used demo address (geolocation unavailable)","w");
  };
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      ()=>done("Anna Nagar West, Chennai, Tamil Nadu — 600040"),
      fail, {timeout:7000}
    );
  } else fail();
}

function placeOrder(){
  let address="";
  if(ST.checkout.mode==="live"){
    if(!ST.checkout.liveAddr){ toast("Please detect your location first","e"); return }
    address=ST.checkout.liveAddr;
  } else {
    const flat   = ($("M_flat")  ||{}).value?.trim()||"";
    const street = ($("M_street")||{}).value?.trim()||"";
    const city   = ($("M_city")  ||{}).value?.trim()||"";
    const pin    = ($("M_pin")   ||{}).value?.trim()||"";
    let ok=true;
    const chk=(id,eid,test)=>{ const ok2=test; $(`E_${eid}`).classList.toggle("show",!ok2); if(!ok2) ok=false; return ok2 };
    chk("M_flat",  "flat",  flat.length>0);
    chk("M_street","street",street.length>0);
    chk("M_city",  "city",  city.length>0);

    date: new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}),

/* ── MAP ANIMATION ──
   Waypoints follow the SVG route:
   M22,164 L70,164 L70,88 L210,88 L210,42 L350,42 L350,124
*/
function startMap(si){
  const WP=[[22,160],[70,160],[70,84],[210,84],[210,38],[350,38],[350,120]];
  const maxWP = [0,2,5,6][Math.min(si,3)];

  if(si>=3){
    const r=$("RIDER"); if(r){r.setAttribute("x",337);r.setAttribute("y",120)} return;
  }
  /* total path length up to maxWP */
  let totalLen=0;
  for(let i=0;i<maxWP;i++){
    const dx=WP[i+1][0]-WP[i][0], dy=WP[i+1][1]-WP[i][1];
    totalLen+=Math.sqrt(dx*dx+dy*dy);
  }
  const speed = si>=2 ? 1.1 : 0.55;
  let t=0; ST.mapSI=si;

  function frame(){
    const rider=$("RIDER"); if(!rider){ cancelAnim(); return }
    t=(t+speed)%(totalLen||1);
    let rem=t, px=WP[0][0], py=WP[0][1];
    for(let i=0;i<maxWP;i++){
      const dx=WP[i+1][0]-WP[i][0], dy=WP[i+1][1]-WP[i][1];
      const sl=Math.sqrt(dx*dx+dy*dy);
      if(rem<=sl){ const r=rem/sl; px=WP[i][0]+dx*r; py=WP[i][1]+dy*r; break }
      rem-=sl;
      if(i===maxWP-1){ px=WP[maxWP][0]; py=WP[maxWP][1] }
    }
    rider.setAttribute("x",px-8); rider.setAttribute("y",py+4);
    ST.raf=requestAnimationFrame(frame);
  }
  ST.raf=requestAnimationFrame(frame);
}

        </select>
      </div>`).join("");
    ao.innerHTML=rows||`<div class="empty"><div class="empty-icon">📋</div><p style="color:var(--txt2)">No orders yet.</p></div>`;
  }
  /* also update account dashboard order pills if visible */
}

/* ═══════════════════════════════════════════════════════════
   MASTER RENDER
═══════════════════════════════════════════════════════════ */
function render(){
  cancelAnim(); stopPoll();
  const screens={
    home:scrHome, detail:scrDetail, login:scrLogin,
    checkout:scrCheckout, confirmed:scrConfirmed,
    account:scrAccount, tracking:scrTracking, admin:scrAdmin,
  };
  const fn=screens[ST.screen]||scrHome;
  $("APP").innerHTML=fn();

  /* post-render hooks */
  if(ST.screen==="tracking"){
    const o=ST.orders.find(x=>x.id===ST.trackId);
    if(o){
      const si=statusIndex(o.status); ST.mapSI=si;
      setTimeout(()=>startMap(si),80);
      startPoll();
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
