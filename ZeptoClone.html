<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ZeptoClone — 10-Minute Delivery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pur:#7B2FF7;--pur-l:#9d5ffa;--pur-d:#5a1fd4;--pur-g:rgba(123,47,247,.1);
  --acc:#FF3E6C;--acc-l:#ff6b8a;
  --bg:#fff;--bg2:#f6f6fb;--bg3:#eeeff7;
  --card:#fff;--border:#e8e8f0;--border2:#d4d4e0;
  --txt:#1a1a2e;--txt2:#666680;--txt3:#a0a0b8;
  --ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--info:#3b82f6;
  --r:12px;--rs:8px;
  --sh:0 2px 16px rgba(0,0,0,.08);--sha:0 6px 28px rgba(123,47,247,.22);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg2);color:var(--txt);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
button,input,select,textarea{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{height:0;width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.fade{animation:fadeIn .25s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.page{max-width:600px;margin:0 auto;padding:14px 14px 72px}

/* NAV */
.nav{position:sticky;top:0;z-index:800;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.07)}
.nav-top{display:flex;align-items:center;gap:9px;padding:10px 14px;max-width:1100px;margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:6px;cursor:pointer;flex-shrink:0;text-decoration:none}
.nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--pur),var(--acc));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;color:#fff;font-family:'Syne',sans-serif}
.nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--pur)}
.nav-brand em{color:var(--acc);font-style:normal}
.nav-search{flex:1;display:flex;align-items:center;border:1.5px solid var(--border2);border-radius:22px;background:var(--bg2);padding:0 12px;gap:7px;transition:border-color .18s,box-shadow .18s;min-width:0}
.nav-search:focus-within{border-color:var(--pur);box-shadow:0 0 0 3px var(--pur-g)}
.nav-search input{flex:1;border:none;background:transparent;outline:none;font-size:.87rem;color:var(--txt);padding:8px 0;min-width:0}
.nav-search input::placeholder{color:var(--txt3)}
.nav-search-btn{background:none;border:none;cursor:pointer;padding:3px;color:var(--txt3);display:flex;align-items:center;font-size:1rem}
.nav-search-btn:hover{color:var(--pur)}
.nav-actions{display:flex;align-items:center;gap:3px;flex-shrink:0}
.nav-icon{position:relative;width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:var(--txt2);transition:background .15s,color .15s}
.nav-icon:hover{background:var(--bg3);color:var(--pur)}
.badge{position:absolute;top:-2px;right:-2px;min-width:16px;height:16px;border-radius:8px;background:var(--acc);color:#fff;font-size:.6rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;border:2px solid #fff}
.nav-user{display:flex;align-items:center;gap:5px;cursor:pointer;background:var(--bg3);border:1.5px solid var(--border);border-radius:22px;padding:3px 10px 3px 4px;transition:border-color .15s;font-size:.8rem;font-weight:600;color:var(--txt)}
.nav-user:hover{border-color:var(--pur)}
.av{width:27px;height:27px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pur),var(--acc));display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;color:#fff;font-family:'Syne',sans-serif}
.av-lg{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--pur),var(--acc));display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;color:#fff;font-family:'Syne',sans-serif;margin:0 auto 12px;box-shadow:var(--sha)}
.nav-login-btn{padding:7px 13px;border-radius:20px;background:var(--pur);color:#fff;border:none;font-size:.78rem;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap}
.nav-login-btn:hover{background:var(--pur-d)}
.nav-admin-btn{padding:6px 11px;border-radius:20px;background:transparent;color:var(--txt2);border:1.5px solid var(--border2);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-admin-btn:hover{border-color:var(--pur);color:var(--pur)}

/* CATEGORY TABS */
.cat-wrap{overflow-x:auto;white-space:nowrap;padding:0 14px;border-bottom:1px solid var(--border);background:#fff}
.cat-wrap::-webkit-scrollbar{height:0}
.cat-tab{display:inline-block;padding:10px 15px;cursor:pointer;font-size:.83rem;font-weight:600;color:var(--txt2);border-bottom:2.5px solid transparent;transition:all .15s}
.cat-tab:hover{color:var(--pur)}
.cat-tab.on{color:var(--pur);border-bottom-color:var(--pur)}

/* HERO SLIDER */
.slider-outer{padding:14px 14px 0;max-width:600px;margin:0 auto}
.slider-wrap{position:relative;border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.slider-track{display:flex;transition:transform .4s cubic-bezier(.4,0,.2,1)}
.slide{flex:0 0 100%;min-height:126px;padding:22px 26px;display:flex;flex-direction:column;justify-content:center}
.slide-tag{font-size:.69rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;opacity:.8;margin-bottom:5px}
.slide-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;line-height:1.2;margin-bottom:5px}
.slide-sub{font-size:.8rem;opacity:.88}
.sl1{background:linear-gradient(135deg,#6d28d9,#7B2FF7,#a855f7);color:#fff}
.sl2{background:linear-gradient(135deg,#be123c,#FF3E6C,#f97316);color:#fff}
.sl3{background:linear-gradient(135deg,#1d4ed8,#3b82f6,#06b6d4);color:#fff}
.sl-btn{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.3);backdrop-filter:blur(4px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:#fff;transition:background .15s;z-index:2}
.sl-btn:hover{background:rgba(255,255,255,.5)}
.sl-prev{left:9px}.sl-next{right:9px}
.sl-dots{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:all .2s}
.dot.on{background:#fff;width:18px;border-radius:3px}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 8px;max-width:600px;margin:0 auto}
.sec-head h2{font-size:.98rem;font-weight:800;color:var(--txt)}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;padding:0 14px 14px;max-width:600px;margin:0 auto}
@media(min-width:480px){.pgrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.pgrid{grid-template-columns:repeat(4,1fr)}}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;position:relative;transition:transform .18s,box-shadow .18s,border-color .18s}
.pcard:not(.oos):hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--pur-l)}
.pcard.oos{cursor:not-allowed;opacity:.6}
.pcard-img{font-size:2.9rem;background:var(--bg3);display:flex;align-items:center;justify-content:center;padding:18px 8px 12px;min-height:82px}
.pcard-body{padding:9px 11px 12px}
.pcard-name{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:2px;color:var(--txt)}
.pcard-cat{font-size:.67rem;color:var(--txt3);margin-bottom:4px}
.pcard-price{font-size:.93rem;font-weight:800;color:var(--pur);font-family:'Syne',sans-serif}
.oos-badge{position:absolute;top:7px;left:7px;background:var(--err);color:#fff;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px}
.heart-btn{position:absolute;top:7px;right:7px;width:27px;height:27px;border:none;border-radius:50%;background:rgba(255,255,255,.88);backdrop-filter:blur(3px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:transform .14s;z-index:2;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.heart-btn:hover{transform:scale(1.18)}
.add-btn{width:100%;margin-top:8px;padding:7px;border-radius:var(--rs);border:1.5px solid var(--pur);background:var(--pur-g);color:var(--pur);font-size:.77rem;font-weight:700;cursor:pointer;transition:all .15s}
.add-btn:hover:not(:disabled){background:var(--pur);color:#fff}
.add-btn:disabled{opacity:.38;cursor:not-allowed;border-color:var(--border2);color:var(--txt3);background:transparent}

/* BUTTONS */
.btn{width:100%;padding:13px 20px;border-radius:var(--r);border:none;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:disabled{opacity:.44;cursor:not-allowed}
.btn:not(:disabled):active{transform:scale(.98)}
.btn-pri{background:linear-gradient(135deg,var(--pur),var(--pur-l));color:#fff;box-shadow:0 4px 16px var(--pur-g)}
.btn-pri:not(:disabled):hover{transform:translateY(-1px);box-shadow:var(--sha)}
.btn-out{background:transparent;border:1.5px solid var(--pur);color:var(--pur)}
.btn-out:not(:disabled):hover{background:var(--pur-g)}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--txt2)}
.btn-ghost:not(:disabled):hover{border-color:var(--pur);color:var(--pur)}
.btn-acc{background:linear-gradient(135deg,var(--acc),var(--acc-l));color:#fff}
.btn-sm{padding:7px 13px;font-size:.77rem;width:auto;border-radius:var(--rs)}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);color:var(--txt2);padding:7px 13px;border-radius:20px;font-size:.8rem;cursor:pointer;transition:all .15s}
.back-btn:hover{border-color:var(--pur);color:var(--pur)}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card+.card{margin-top:11px}

/* FORM */
.fg{margin-bottom:13px}
.fg:last-child{margin-bottom:0}
.lbl{display:block;font-size:.71rem;font-weight:700;color:var(--txt2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp{width:100%;padding:11px 13px;background:var(--bg2);border:1.5px solid var(--border2);border-radius:var(--rs);color:var(--txt);font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus{border-color:var(--pur);box-shadow:0 0 0 3px var(--pur-g)}
.inp.err-inp{border-color:var(--err)}
.inp[readonly]{background:var(--bg3);opacity:.78;cursor:not-allowed}
select.inp{cursor:pointer}
.ph-wrap{display:flex}
.ph-pre{padding:11px 11px;background:var(--bg3);border:1.5px solid var(--border2);border-right:none;border-radius:var(--rs) 0 0 var(--rs);color:var(--pur);font-weight:700;font-size:.9rem;flex-shrink:0;display:flex;align-items:center}
.ph-wrap .inp{border-radius:0 var(--rs) var(--rs) 0}
.ferr{color:var(--err);font-size:.74rem;margin-top:3px;display:none}
.ferr.show{display:block}

/* OTP */
.otp-row{display:flex;gap:8px;justify-content:center;margin:15px 0}
.otp-inp{width:42px;height:50px;text-align:center;font-size:1.25rem;font-weight:800;font-family:'Syne',sans-serif;background:var(--bg2);border:2px solid var(--border2);border-radius:10px;color:var(--txt);outline:none;transition:border-color .15s,box-shadow .15s}
.otp-inp:focus{border-color:var(--pur);box-shadow:0 0 0 3px var(--pur-g)}
.otp-inp.filled{border-color:var(--pur);background:var(--pur-g)}
.otp-inp.shake{animation:shake .38s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.sms-bubble{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:11px 13px;font-size:.83rem;display:flex;align-items:flex-start;gap:8px;margin-top:11px}
.timer{text-align:center;font-size:.81rem;color:var(--txt2);margin:8px 0}
.timer b{color:var(--pur)}

/* TABS */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:15px}
.tab{flex:1;padding:10px;text-align:center;font-size:.83rem;font-weight:600;color:var(--txt2);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.on{color:var(--pur);border-bottom-color:var(--pur)}

/* STATUS PILLS */
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.69rem;font-weight:700;white-space:nowrap}
.pill-blue{background:#dbeafe;color:#1d4ed8}
.pill-amber{background:#fef3c7;color:#92400e}
.pill-pur{background:var(--pur-g);color:var(--pur-d)}
.pill-green{background:#dcfce7;color:#15803d}
.pill-grey{background:var(--bg3);color:var(--txt2)}

/* ORDER CARD */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.order-card:last-child{margin-bottom:0}

/* DELIVERY STRIP */
.dstrip{background:rgba(123,47,247,.07);border:1px solid rgba(123,47,247,.16);border-radius:var(--rs);padding:10px 14px;font-size:.81rem;color:var(--pur-d);font-weight:600;display:flex;align-items:center;gap:8px}

/* SUCCESS */
.success-circle{width:86px;height:86px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;font-size:2.3rem;margin:0 auto 14px;animation:pop .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

/* TRACKING MAP */
.map-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:13px}

/* STEPS */
.steps{display:flex;flex-direction:column}
.step-row{display:flex;align-items:flex-start;gap:12px;padding-bottom:15px;position:relative}
.step-row:last-child{padding-bottom:0}
.step-row:not(:last-child)::before{content:'';position:absolute;left:14px;top:30px;width:2px;height:calc(100% - 14px);background:var(--border)}
.step-row.s-done::before{background:var(--ok)}
.step-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:800;background:var(--bg3);border:2px solid var(--border2);color:var(--txt3);position:relative;z-index:1}
.step-dot.done{background:var(--ok);border-color:var(--ok);color:#fff}
.step-dot.active{background:var(--pur);border-color:var(--pur);color:#fff;animation:puls 1.4s ease infinite}
@keyframes puls{0%,100%{box-shadow:0 0 0 0 rgba(123,47,247,.4)}50%{box-shadow:0 0 0 8px rgba(123,47,247,0)}}
.step-info{padding-top:4px}
.step-title{font-size:.88rem;font-weight:700;color:var(--txt)}
.step-title.dim{color:var(--txt3)}
.step-time{font-size:.74rem;color:var(--txt3);margin-top:1px}

/* ETA CARD */
.eta-card{background:linear-gradient(135deg,var(--pur),var(--pur-l));color:#fff;border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.eta-val{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800}
.eta-lbl{font-size:.74rem;opacity:.85;margin-top:2px}

/* ADMIN */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-family:'Syne',sans-serif;font-size:1.45rem;font-weight:800;color:var(--pur)}
.stat-lbl{font-size:.73rem;color:var(--txt2);margin-top:2px}
.adm-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.adm-row:last-child{border-bottom:none}
.emo-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin:9px 0}
.emo{width:34px;height:34px;border-radius:var(--rs);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:border-color .13s,background .13s}
.emo:hover{border-color:var(--pur);background:var(--pur-g)}
.emo.sel{border-color:var(--pur);background:var(--pur-g)}
.status-sel{padding:5px 8px;border:1.5px solid var(--border2);border-radius:var(--rs);background:var(--bg2);color:var(--txt);font-size:.79rem;cursor:pointer;outline:none}
.status-sel:focus{border-color:var(--pur)}

/* WISHLIST */
.wl-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.wl-card:last-child{margin-bottom:0}
.wl-emoji{font-size:2.1rem;background:var(--bg3);border-radius:var(--rs);padding:8px;flex-shrink:0;width:54px;height:54px;display:flex;align-items:center;justify-content:center}
.wl-info{flex:1;min-width:0}
.wl-name{font-size:.88rem;font-weight:700;color:var(--txt);margin-bottom:2px}
.wl-price{font-size:.88rem;font-weight:800;color:var(--pur)}
.wl-btns{display:flex;flex-direction:column;gap:5px;flex-shrink:0}

/* EMPTY */
.empty{text-align:center;padding:44px 20px}
.empty-icon{font-size:3.4rem;margin-bottom:10px}
.empty p{color:var(--txt2);font-size:.88rem}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
.toast{padding:10px 20px;border-radius:22px;font-size:.83rem;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.18);animation:tIn .28s ease,tOut .28s ease 2.5s forwards;pointer-events:none;white-space:nowrap;max-width:320px;text-align:center}
.toast.s{background:linear-gradient(135deg,#16a34a,#22c55e)}
.toast.e{background:linear-gradient(135deg,#dc2626,#ef4444)}
.toast.w{background:linear-gradient(135deg,#d97706,#f59e0b)}
.toast.i{background:linear-gradient(135deg,var(--pur),var(--pur-l))}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}

.div{height:1px;background:var(--border);margin:11px 0}
</style>
</head>
<body>
<div id="APP"></div>
<div class="toast-wrap" id="TOAST_WRAP"></div>
<script>
/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
const ST={
  screen:"home",prev:"home",loginReturn:"home",
  user:null,
  activeCat:"All",
  searchQ:"",
  wishlist:[],
  cart:[],
  orders:[],
  curOrder:null,
  trackId:null,
  selProduct:null,
  adminTab:"products",
  adminEmoji:"🛍️",
  otpData:{code:"",name:"",phone:"",exp:0,tid:null,cd:120},
  coMode:"live",coLiveAddr:"",coManual:{},
  slider:{idx:0,timer:null},
  raf:null,poll:null,mapSI:-1,
  products:[
    {id:"p1",e:"☕",name:"Barista Cold Brew",price:149,cat:"Cafe",desc:"Rich cold brew coffee, smooth and bold. 250ml bottle.",stock:true},
    {id:"p2",e:"🍰",name:"Red Velvet Cake Slice",price:89,cat:"Cafe",desc:"Moist red velvet with cream cheese frosting.",stock:true},
    {id:"p3",e:"🧁",name:"Blueberry Muffin",price:59,cat:"Cafe",desc:"Freshly baked with real blueberries. Soft and sweet.",stock:false},
    {id:"p4",e:"🧃",name:"Mixed Juice Pack",price:129,cat:"Cafe",desc:"6 assorted fruit juice boxes, 200ml each.",stock:true},
    {id:"p5",e:"🪴",name:"Indoor Plant Set",price:399,cat:"Home",desc:"Set of 3 low-maintenance indoor plants with pots.",stock:true},
    {id:"p6",e:"🕯️",name:"Vanilla Scented Candle",price:249,cat:"Home",desc:"Hand-poured soy wax, 40-hour burn time.",stock:true},
    {id:"p7",e:"🧸",name:"Plush Teddy Bear",price:349,cat:"Toys",desc:"Super soft 30cm teddy, machine washable.",stock:true},
    {id:"p8",e:"🎮",name:"Handheld Game Console",price:1299,cat:"Toys",desc:"Built-in 200 classic games, 3-hour battery.",stock:false},
    {id:"p9",e:"🥗",name:"Organic Salad Mix",price:79,cat:"Fresh",desc:"Pre-washed, ready-to-eat greens and veggies.",stock:true},

function toggleWish(id,e){

  const idx=ST.wishlist.indexOf(id);
  if(idx>-1){ST.wishlist.splice(idx,1);toast("Removed from wishlist","w")}
  else{ST.wishlist.push(id);toast("Added to wishlist ❤️","s")}
  render();
}

function addToCart(id,e){
  if(e)e.stopPropagation();
  const p=ST.products.find(x=>x.id===id);
  if(!p||!p.stock)return;
  const ex=ST.cart.find(i=>i.product.id===id);
  if(ex)ex.qty++;else ST.cart.push({product:p,qty:1});
  ST.selProduct=p;
  toast(`${p.e} ${p.name} added to cart!`,"s");
  render();
}

function scrHome(){
  const q=ST.searchQ.trim().toLowerCase();

    const qOk=!q||p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q);
    return catOk&&qOk;
  });

  let body="";
  if(ST.activeCat==="All"&&!q){
    const secs=[
      {t:"🥦 Fresh Picks",f:"Fresh"},{t:"☕ Café Corner",f:"Cafe"},
      {t:"🏠 Home Essentials",f:"Home"},{t:"📱 Electronics & Mobiles",f:["Electronics","Mobiles"]},
      {t:"💄 Beauty & Fashion",f:["Beauty","Fashion"]},{t:"🎉 Toys & Fun",f:"Toys"},
    ];
    secs.forEach(s=>{
      const arr=prods.filter(p=>Array.isArray(s.f)?s.f.includes(p.cat):p.cat===s.f);
      if(arr.length===0)return;
      body+=`<div class="sec-head"><h2>${s.t}</h2></div>${buildGrid(arr)}`;

function sendOTP(){
  const name=($("L_name")||{}).value?.trim()||"";
  const phone=($("L_phone")||{}).value?.trim()||"";
  let ok=true;
  if(name.length<2){$("E_name").classList.add("show");$("L_name").classList.add("err-inp");ok=false}
  else{$("E_name").classList.remove("show");$("L_name").classList.remove("err-inp")}
  if(!/^\d{10}$/.test(phone)){$("E_phone").classList.add("show");$("L_phone").classList.add("err-inp");ok=false}
  else{$("E_phone").classList.remove("show");$("L_phone").classList.remove("err-inp")}
  if(!ok)return;
  const code=String(Math.floor(100000+Math.random()*900000));
  ST.otpData={code,name,phone,exp:Date.now()+120000,tid:null,cd:120};
  $("step2").style.display="block";
  $("otp_sub").textContent=`OTP sent to +91 ${phone.slice(0,5)}XXXXX`;
  $("SMS_box").style.display="flex";
  $("SMS_text").textContent=`Your ZeptoClone OTP is ${code}. Valid for 2 minutes. Do not share.`;
  $("B_send").textContent="✅ OTP Sent";$("B_send").disabled=true;
  wireOTPBoxes();startOTPTimer();
  toast("OTP sent! Check the SMS bubble below 📲","i");
  setTimeout(()=>$("step2")?.scrollIntoView({behavior:"smooth",block:"nearest"}),200);
  document.querySelector(".otp-inp[data-idx='0']")?.focus();
}

function changeNumber(){
  clearOTPTimer();
  $("step2").style.display="none";$("SMS_box").style.display="none";
  $("B_send").textContent="Send OTP →";$("B_send").disabled=false;
  document.querySelectorAll(".otp-inp").forEach(b=>{b.value="";b.classList.remove("filled","shake")});
  ST.otpData={code:"",name:ST.otpData.name,phone:ST.otpData.phone,exp:0,tid:null,cd:120};
}

function wireOTPBoxes(){
  document.querySelectorAll(".otp-inp").forEach(b=>{
    b.value="";b.classList.remove("filled","shake");
    b.oninput=e=>{
      const v=e.target.value.replace(/\D/g,"");
      e.target.value=v?v[0]:"";
      e.target.classList.toggle("filled",!!v);
      e.target.classList.remove("shake");
      if(v){const nx=document.querySelector(`.otp-inp[data-idx="${+e.target.dataset.idx+1}"]`);if(nx)nx.focus()}
      checkOTPFull();
    };
    b.onkeydown=e=>{
      if(e.key==="Backspace"&&!e.target.value){
        const pv=document.querySelector(`.otp-inp[data-idx="${+e.target.dataset.idx-1}"]`);
        if(pv){pv.value="";pv.classList.remove("filled");pv.focus()}
      }
    };
    b.onpaste=e=>{
      e.preventDefault();
      const txt=(e.clipboardData||window.clipboardData).getData("text").replace(/\D/g,"");
      [...txt.slice(0,6)].forEach((ch,i)=>{const bx=document.querySelector(`.otp-inp[data-idx="${i}"]`);if(bx){bx.value=ch;bx.classList.add("filled")}});
      checkOTPFull();
    };
  });
}

function getOTPValue(){return[...document.querySelectorAll(".otp-inp")].map(b=>b.value).join("")}

function checkOTPFull(){
  const v=getOTPValue();
  const vb=$("B_verify");if(vb)vb.disabled=v.length!==6;
  if(v.length===6)setTimeout(verifyOTP,80);
}

function startOTPTimer(){
  clearOTPTimer();
  function tick(){
    const rem=Math.max(0,Math.ceil((ST.otpData.exp-Date.now())/1000));
    ST.otpData.cd=rem;
    const el=$("OTP_timer");if(!el){clearOTPTimer();return}
    if(rem>0){
      const m=String(Math.floor(rem/60)).padStart(2,"0"),s=String(rem%60).padStart(2,"0");
      el.innerHTML=`OTP expires in <b>${m}:${s}</b>`;
    }else{
      el.innerHTML=`OTP expired. <a href="#" style="color:var(--pur);font-weight:700" onclick="resendOTP();return false">Resend OTP</a>`;
      clearOTPTimer();
    }
  }
  tick();ST.otpData.tid=setInterval(tick,1000);
}

function clearOTPTimer(){if(ST.otpData.tid){clearInterval(ST.otpData.tid);ST.otpData.tid=null}}

function resendOTP(){
  const code=String(Math.floor(100000+Math.random()*900000));
  ST.otpData.code=code;ST.otpData.exp=Date.now()+120000;
  $("SMS_text").textContent=`Your ZeptoClone OTP is ${code}. Valid for 2 minutes. Do not share.`;
  document.querySelectorAll(".otp-inp").forEach(b=>{b.value="";b.classList.remove("filled","shake")});
  const vb=$("B_verify");if(vb)vb.disabled=true;
  startOTPTimer();toast("New OTP sent! ✅","s");
  document.querySelector(".otp-inp[data-idx='0']")?.focus();
}

function verifyOTP(){
  const entered=getOTPValue();if(entered.length!==6)return;
  if(Date.now()>ST.otpData.exp){showOTPErr("⏰ OTP expired. Please resend.");return}
  if(entered===ST.otpData.code){
    clearOTPTimer();
    ST.user={name:ST.otpData.name,phone:ST.otpData.phone};
    toast(`Welcome, ${firstName()}! 🎉`,"s");
    const dest=ST.loginReturn;ST.loginReturn="home";
    if(dest==="checkout"&&ST.selProduct)go("checkout","login");
    else go(dest||"home","login");
  }else{
    showOTPErr("❌ Incorrect OTP. Please try again.");
    document.querySelectorAll(".otp-inp").forEach(b=>b.classList.add("shake"));
    setTimeout(()=>{
      document.querySelectorAll(".otp-inp").forEach(b=>{b.value="";b.classList.remove("filled","shake")});
      const vb=$("B_verify");if(vb)vb.disabled=true;
      document.querySelector(".otp-inp[data-idx='0']")?.focus();
    },900);
  }
}

function showOTPErr(m){const el=$("OTP_err");if(el){el.textContent=m;el.classList.add("show");el.style.display="block"}}

function setCoMode(m){
  ST.coMode=m;
  const live=$("ADDR_LIVE"),man=$("ADDR_MAN");
  if(live)live.style.display=m==="live"?"":"none";
  if(man)man.style.display=m==="manual"?"":"none";
  document.querySelectorAll(".tabs .tab").forEach((t,i)=>t.classList.toggle("on",(m==="live"&&i===0)||(m==="manual"&&i===1)));
}

function detectLocation(){
  const btn=$("B_detect");if(btn){btn.textContent="⏳ Detecting…";btn.disabled=true}
  if(!navigator.geolocation){setLiveAddr("Chennai, Tamil Nadu 600001");return}
  navigator.geolocation.getCurrentPosition(
    pos=>setLiveAddr(`Lat ${pos.coords.latitude.toFixed(4)}, Lng ${pos.coords.longitude.toFixed(4)}`),
    ()=>setLiveAddr("Chennai, Tamil Nadu 600001")
  );
}

function setLiveAddr(addr){
  ST.coLiveAddr=addr;
  const inp=$("I_live");if(inp)inp.value=addr;
  const btn=$("B_detect");if(btn){btn.textContent="✅ Location Detected";btn.disabled=false}
  toast("Location detected! 📍","s");
}

function placeOrder(){
  if(!ST.user||!ST.selProduct)return;
  let addr="";
  if(ST.coMode==="live"){
    addr=($("I_live")||{}).value?.trim()||ST.coLiveAddr;
    if(!addr){toast("Please detect your location first 📍","e");return}
  }else{
    ST.coManual={
      flat:($("M_flat")||{}).value?.trim()||"",
      street:($("M_street")||{}).value?.trim()||"",
      city:($("M_city")||{}).value?.trim()||"",
      pin:($("M_pin")||{}).value?.trim()||""
    };
    const m=ST.coManual;let ok=true;
    if(!m.flat){$("E_flat").classList.add("show");ok=false}else $("E_flat").classList.remove("show");
    if(!m.street){$("E_street").classList.add("show");ok=false}else $("E_street").classList.remove("show");
    if(!m.city){$("E_city").classList.add("show");ok=false}else $("E_city").classList.remove("show");
    if(!/^\d{6}$/.test(m.pin)){$("E_pin").classList.add("show");ok=false}else $("E_pin").classList.remove("show");
    if(!ok)return;
    addr=`${m.flat}, ${m.street}, ${m.city} - ${m.pin}`;
  }
  const oid="ORD"+String(Date.now()).slice(-6);
  const order={id:oid,product:ST.selProduct,customer:{name:ST.user.name,phone:ST.user.phone},
    address:addr,status:"placed",date:fmtDate(),time:fmtTime(),price:ST.selProduct.price};
  ST.orders.push(order);ST.curOrder=order;ST.trackId=oid;
  ST.coLiveAddr="";ST.coManual={};
  toast("Order placed! 🎉","s");
  go("confirmed","checkout");
}

/* ── MAP ANIMATION ── */
function startMap(si){
  const WP=[[22,160],[70,160],[70,84],[210,84],[210,38],[350,38],[350,116]];
  if(si>=3){const r=$("RIDER");if(r){r.setAttribute("x",342);r.setAttribute("y",118)}return}
  const maxWP=[0,2,5,6][Math.min(si,3)];
  let totalLen=0;
  for(let i=0;i<maxWP;i++){const dx=WP[i+1][0]-WP[i][0],dy=WP[i+1][1]-WP[i][1];totalLen+=Math.sqrt(dx*dx+dy*dy)}
  if(totalLen===0){const r=$("RIDER");if(r){r.setAttribute("x",WP[0][0]-8);r.setAttribute("y",WP[0][1]+4)}return}
  const speed=si>=2?1.2:0.55;let t=0;ST.mapSI=si;
  function frame(){
    const rider=$("RIDER");if(!rider){cancelAnim();return}
    t=(t+speed)%(totalLen||1);
    let rem=t,px=WP[0][0],py=WP[0][1];
    for(let i=0;i<maxWP;i++){
      const dx=WP[i+1][0]-WP[i][0],dy=WP[i+1][1]-WP[i][1],sl=Math.sqrt(dx*dx+dy*dy);
      if(rem<=sl){const r=rem/sl;px=WP[i][0]+dx*r;py=WP[i][1]+dy*r;break}
      rem-=sl;if(i===maxWP-1){px=WP[maxWP][0];py=WP[maxWP][1]}
    }
    rider.setAttribute("x",px-8);rider.setAttribute("y",py+4);
    ST.raf=requestAnimationFrame(frame);
  }
  ST.raf=requestAnimationFrame(frame);
}

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <span id="EMO_prev" style="font-size:2rem">${ST.adminEmoji}</span>
          <span style="font-size:.8rem;color:var(--txt2)">Selected emoji</span>
        </div>
        <div class="emo-grid">${emojiGrid}</div>
        <div class="fg"><label class="lbl">Product Name</label><input class="inp" id="AP_name" type="text" placeholder="e.g. Mango Smoothie"/></div>
        <div class="fg"><label class="lbl">Price (₹)</label><input class="inp" id="AP_price" type="number" min="1" placeholder="e.g. 149"/></div>
        <div class="fg"><label class="lbl">Category</label>
          <select class="inp" id="AP_cat">
            <option value="">Select category</option>
            ${["Cafe","Home","Toys","Fresh","Electronics","Mobiles","Beauty","Fashion"].map(c=>`<option value="${c}">${c}</option>`).join("")}
          </select></div>
        <div class="fg"><label class="lbl">Description</label><input class="inp" id="AP_desc" type="text" placeholder="Short product description"/></div>
        <button class="btn btn-pri" onclick="addProduct()">+ Add Product</button>
      </div>
      <div class="card"><div class="lbl" style="margin-bottom:10px">All Products (${ST.products.length})</div>${prodRows}</div>
    </div>
    <div id="A_orders" style="${ST.adminTab!=="orders"?"display:none":""}">
      ${orderRows}
    </div>
  </div>`;
}

function setAdminTab(t){
  ST.adminTab=t;
  const ap=$("A_prod"),ao=$("A_orders");
  if(ap)ap.style.display=t==="products"?"":"none";
  if(ao)ao.style.display=t==="orders"?"":"none";
  document.querySelectorAll(".tabs .tab").forEach((b,i)=>b.classList.toggle("on",(t==="products"&&i===0)||(t==="orders"&&i===1)));
}

function pickEmoji(e){
  ST.adminEmoji=e;
  document.querySelectorAll(".emo").forEach(el=>el.classList.toggle("sel",el.textContent===e));
  const p=$("EMO_prev");if(p)p.textContent=e;
}

function addProduct(){
  const name=($("AP_name")||{}).value?.trim()||"";
  const price=parseInt(($("AP_price")||{}).value||"0");
  const cat=($("AP_cat")||{}).value||"";
  const desc=($("AP_desc")||{}).value?.trim()||"";
  if(!name||!price||!cat||!desc){toast("Please fill all product fields","e");return}
  if(isNaN(price)||price<=0){toast("Enter a valid price","e");return}
  ST.products.push({id:"p"+Date.now(),e:ST.adminEmoji,name,price,cat,desc,stock:true});
  toast(`"${ST.adminEmoji} ${name}" added! ✅`,"s");render();
}

function toggleStock(id){
  const p=ST.products.find(x=>x.id===id);if(!p)return;
  p.stock=!p.stock;
  toast(`${p.name} → ${p.stock?"In Stock ✅":"Out of Stock ❌"}`,p.stock?"s":"w");render();
}

function updateStatus(id,st){
  const o=ST.orders.find(x=>x.id===id);if(!o)return;
  o.status=st;
  const names={placed:"Order Placed",packed:"Packed",delivery:"Out for Delivery",delivered:"Delivered"};
  toast(`#${id} → ${names[st]}`,"s");
  const ao=$("A_orders");
  if(ao&&ST.adminTab==="orders"){
    ao.innerHTML=ST.orders.length===0
      ?`<div class="empty"><div class="empty-icon">📋</div><p>No orders yet.</p></div>`
      :ST.orders.slice().reverse().map(oo=>`
        <div class="card" style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
            <div>
              <div style="font-size:.64rem;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.4px">Order ID</div>
              <div style="font-weight:800;font-family:'Syne',sans-serif;font-size:.88rem">${oo.id}</div>
            </div>
            <span class="pill ${statusMeta(oo.status).cls}">${statusMeta(oo.status).lbl}</span>
          </div>
          <div style="font-size:.81rem;margin-bottom:2px">👤 ${oo.customer.name} · +91 ${oo.customer.phone}</div>
          <div style="font-size:.81rem;margin-bottom:2px">${oo.product.e} ${oo.product.name} — ₹${oo.price}</div>
          <div style="font-size:.74rem;color:var(--txt3);margin-bottom:5px">📍 ${oo.address}</div>
          <div style="font-size:.71rem;color:var(--txt3);margin-bottom:8px">${oo.date} · ${oo.time}</div>
          <select class="status-sel" onchange="updateStatus('${oo.id}',this.value)">
            <option value="placed" ${oo.status==="placed"?"selected":""}>📋 Order Placed</option>
            <option value="packed" ${oo.status==="packed"?"selected":""}>📦 Packed</option>
            <option value="delivery" ${oo.status==="delivery"?"selected":""}>🛵 Out for Delivery</option>
            <option value="delivered" ${oo.status==="delivered"?"selected":""}>✅ Delivered</option>
          </select>
        </div>`).join("");
  }
}

/* ══════════════════════════════════════
   SCREEN 10 — SEARCH RESULTS
══════════════════════════════════════ */
function scrSearch(){
  const q=ST.searchQ.trim().toLowerCase();
  const results=q?ST.products.filter(p=>
    p.name.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)):[];
  const content=!q
    ?`<div class="empty"><div class="empty-icon">🔍</div><p>Type something to search</p></div>`
    :results.length===0
      ?`<div class="empty"><div class="empty-icon">😕</div><p>No products found for<br><b>"${ST.searchQ}"</b></p></div>`
      :buildGrid(results);
  return `${buildNav({showBack:true,backFn:"clearSearch()",title:"Search"})}
  <div class="page fade">
    ${q?`<div style="font-family:'Syne',sans-serif;font-size:.93rem;font-weight:700;margin-bottom:11px;color:var(--txt2)">
      Results for <span style="color:var(--txt)">"${ST.searchQ}"</span>
      ${results.length>0?`<span style="font-size:.79rem;font-weight:400"> (${results.length})</span>`:""}
    </div>`:""}
    ${content}
  </div>`;
}

function clearSearch(){ST.searchQ="";go("home")}

/* ══════════════════════════════════════
   MASTER RENDER
══════════════════════════════════════ */
function render(){
  cancelAnim();stopPoll();stopSlider();
  const screens={home:scrHome,detail:scrDetail,login:scrLogin,checkout:scrCheckout,
    confirmed:scrConfirmed,account:scrAccount,tracking:scrTracking,
    wishlist:scrWishlist,admin:scrAdmin,search:scrSearch};
  $("APP").innerHTML=(screens[ST.screen]||scrHome)();
  if(ST.screen==="home")startSlider();
  if(ST.screen==="tracking"){
    const o=ST.orders.find(x=>x.id===ST.trackId);
    if(o){const si=statusIndex(o.status);ST.mapSI=si;setTimeout(()=>startMap(si),80);startPoll()}
  }
}

render();
</script>
</body>
</html>
