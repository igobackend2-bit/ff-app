<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Product Detail — Farmers Factory</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app-wrap">

  <!-- Page bar -->
  <div class="page-bar" id="pageBar">
    <a href="javascript:history.back()" class="back-btn" aria-label="Back">&#8592;</a>
    <span class="page-title">Product Details</span>
    <button class="icon-btn" id="wishBtn" style="margin-left:auto" aria-label="Toggle wishlist">🤍</button>
  </div>

  <!-- Product content -->
  <div class="product-detail" id="productDetail">
    <div class="loader"><div class="spinner"></div><span class="loader-text">Loading product…</span></div>
  </div>

  <!-- Sticky CTA (filled by JS) -->
  <div class="detail-actions" id="detailActions" style="display:none"></div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav" aria-label="Main navigation">
  <a href="/" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="/wishlist.html" class="nav-item"><span class="nav-icon">❤️</span><span>Wishlist</span><span class="nav-badge" data-wish-badge style="display:none">0</span></a>
  <a href="/cart.html" class="nav-item"><span class="nav-icon">🛒</span><span>Cart</span><span class="nav-badge" data-cart-badge style="display:none">0</span></a>
  <a href="/orders.html" class="nav-item"><span class="nav-icon">📋</span><span>Orders</span></a>
  <a href="/profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
</nav>

<div class="toast-container"></div>

<script type="module">
import { fetchProduct, fetchRelated, getCategoryEmoji, toggleWishlist, isWishlisted, updateWishlistBadges } from "/js/products.js";
import { addToCart, getCartItem, updateCartQty, formatPrice, initCartBadge } from "/js/cart.js";
import { showToast } from "/js/utils.js";

initCartBadge();
updateWishlistBadges();

const params  = new URLSearchParams(location.search);
const id      = params.get("id");
if (!id) { window.location.href = "/"; }

let product   = null;
let qty       = 1;
let slideIdx  = 0;
let slideTimer;

async function init() {
  product = await fetchProduct(id);
  if (!product) {
    document.getElementById("productDetail").innerHTML = \`<div class="empty-state"><div class="empty-icon">😕</div><h3>Product not found</h3><p><a href="/" style="color:var(--primary)">Back to home</a></p></div>\`;
    return;
  }

  document.title = product.name + " — Farmers Factory";
  renderDetail();
  renderCTA();
  renderRelated();

  // Wishlist button in header
  const wishBtn = document.getElementById("wishBtn");
  wishBtn.textContent = isWishlisted(id) ? "❤️" : "🤍";
  wishBtn.addEventListener("click", () => {
    const wl = toggleWishlist(id, product.name);
    wishBtn.textContent = wl ? "❤️" : "🤍";
    updateWishlistBadges();
  });
}

function renderDetail() {
  const hasDiscount = product.old_price && product.old_price > product.price;
  const discPct = hasDiscount ? Math.round((1 - product.price / product.old_price) * 100) : 0;
  const emoji = getCategoryEmoji(product.category);
  // Build image slides — if image_url provided use it + emoji as fallback
  const slides = product.image_url ? [{ url: product.image_url }] : [];
  // Always add emoji slide as extra / fallback
  slides.push({ emoji });

  document.getElementById("productDetail").innerHTML = \`
    <!-- Image slider -->
    <div class="slider-wrap" id="sliderWrap">
      <div class="slider-track" id="sliderTrack">
        \${slides.map((s, i) => \`
          <div class="slide" data-i="\${i}">
            \${s.url
              ? \`<img src="\${s.url}" alt="\${product.name}" onerror="this.parentElement.innerHTML='<span style=font-size:80px>\${emoji}</span>'">\`
              : \`<span style="font-size:90px">\${s.emoji}</span>\`
            }
          </div>\`).join("")}
      </div>
      \${slides.length > 1 ? \`
        <button class="slider-arrow prev" id="prevSlide">&#8249;</button>
        <button class="slider-arrow next" id="nextSlide">&#8250;</button>
        <div class="slider-dots" id="sliderDots">
          \${slides.map((_, i) => \`<div class="dot \${i===0?"active":""}"></div>\`).join("")}
        </div>\` : ""}
    </div>

    <!-- Info -->
    <div class="detail-info">
      <div class="detail-top">
        <div>
          <h1 class="detail-name">\${product.name}</h1>
          <div class="detail-unit">\${product.unit}</div>
        </div>
        <span class="cat-badge">\${product.category || "Fresh"}</span>
      </div>
      \${product.is_organic ? '<div style="margin:8px 0"><span class="organic-badge" style="position:static;display:inline-block;font-size:11px">🌱 Certified Organic</span></div>' : ""}
      <div class="stars">★★★★☆ <span style="color:var(--text-3);font-size:13px">(4.2)</span></div>
      <div class="price-row">
        <span class="detail-price">\${formatPrice(product.price)}</span>
        \${hasDiscount ? \`<span class="detail-old">\${formatPrice(product.old_price)}</span><span class="detail-discount">\${discPct}% OFF</span>\` : ""}
      </div>
      \${product.description ? \`<p class="detail-desc">\${product.description}</p>\` : ""}

      <!-- Qty row -->
      <div class="qty-row">
        <span class="qty-label">Quantity:</span>
        <div class="qty-large qty-control">
          <button class="qty-btn" id="qtyDec">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" id="qtyInc">+</button>
        </div>
      </div>

      <!-- Delivery note -->
      <div style="display:flex;align-items:center;gap:8px;background:var(--primary-p);border-radius:12px;padding:10px 14px;margin-bottom:16px">
        <span style="font-size:18px">🚚</span>
        <div>
          <div style="font-size:13px;font-weight:800;color:var(--primary-d)">24hr Delivery</div>
          <div style="font-size:11px;color:var(--primary)">Order now, delivered within 24 hours</div>
        </div>
      </div>
    </div>

    <!-- Related products section -->
    <div class="related-section" id="relatedSection" style="display:none">
      <div class="section-header" style="padding:0 0 10px">
        <h3>More like this</h3>
      </div>
      <div class="related-scroll" id="relatedScroll"></div>
    </div>
  \`;

  // Slider logic
  if (slides.length > 1) setupSlider(slides.length);
  
  // Qty controls
  const cartItem = getCartItem(id);
  if (cartItem) { qty = cartItem.quantity; document.getElementById("qtyNum").textContent = qty; }
  document.getElementById("qtyDec").addEventListener("click", () => { if (qty > 1) { qty--; document.getElementById("qtyNum").textContent = qty; } });
  document.getElementById("qtyInc").addEventListener("click", () => { qty++; document.getElementById("qtyNum").textContent = qty; });
}

function setupSlider(total) {
  const track = document.getElementById("sliderTrack");
  const dots = document.querySelectorAll(".dot");
  
  function goTo(idx) {
    slideIdx = (idx + total) % total;
    track.style.transform = \`translateX(-\${slideIdx * 100}%)\`;
    dots.forEach((d, i) => d.classList.toggle("active", i === slideIdx));
  }
  
  document.getElementById("prevSlide")?.addEventListener("click", () => goTo(slideIdx - 1));
  document.getElementById("nextSlide")?.addEventListener("click", () => goTo(slideIdx + 1));
  slideTimer = setInterval(() => goTo(slideIdx + 1), 3000);
  
  const wrap = document.getElementById("sliderWrap");
  wrap.addEventListener("mouseenter", () => clearInterval(slideTimer));
  wrap.addEventListener("mouseleave", () => { slideTimer = setInterval(() => goTo(slideIdx + 1), 3000); });
  
  // Touch swipe
  let touchX = 0;
  wrap.addEventListener("touchstart", e => { touchX = e.touches[0].clientX; }, { passive: true });
  wrap.addEventListener("touchend", e => {
    const diff = touchX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) goTo(slideIdx + (diff > 0 ? 1 : -1));
  });
}

function renderCTA() {
  const actions = document.getElementById("detailActions");
  actions.style.display = "flex";
  
  const cartItem = getCartItem(id);
  if (cartItem) {
    actions.innerHTML = \`
      <div class="qty-large qty-control" style="flex:1;justify-content:center;border:2px solid var(--primary);border-radius:12px;padding:8px">
        <button class="qty-btn" id="ctaDec">−</button>
        <span class="qty-num" id="ctaQty">\${cartItem.quantity}</span>
        <button class="qty-btn" id="ctaInc">+</button>
      </div>
      <a href="/cart.html" class="btn btn-primary" style="flex:2">🛒 Go to Cart</a>
    \`;
    document.getElementById("ctaDec").addEventListener("click", () => {
      const cur = getCartItem(id)?.quantity || 0;
      updateCartQty(id, cur - 1);
      document.getElementById("ctaQty").textContent = Math.max(0, cur - 1);
      document.getElementById("qtyNum").textContent  = Math.max(1, cur - 1);
      if (cur - 1 <= 0) renderCTA();
    });
    document.getElementById("ctaInc").addEventListener("click", () => {
      const cur = getCartItem(id)?.quantity || 0;
      updateCartQty(id, cur + 1);
      document.getElementById("ctaQty").textContent = cur + 1;
      document.getElementById("qtyNum").textContent  = cur + 1;
    });
  } else {
    actions.innerHTML = \`
      <button class="btn btn-outline" id="addCartBtn" style="flex:1">Add to Cart</button>
      <button class="btn btn-primary" id="buyNowBtn" style="flex:2">🛒 Buy Now</button>
    \`;
    document.getElementById("addCartBtn").addEventListener("click", () => {
      addToCart(product, qty);
      showToast(\`🛒 \${product.name} added to cart\`, "success");
      renderCTA();
    });
    document.getElementById("buyNowBtn").addEventListener("click", () => {
      addToCart(product, qty);
      window.location.href = "/cart.html";
    });
  }
}

async function renderRelated() {
  const related = await fetchRelated(product.category, id);
  if (!related.length) return;
  const section = document.getElementById("relatedSection");
  const scroll  = document.getElementById("relatedScroll");
  section.style.display = "block";
  scroll.innerHTML = related.map(p => \`
    <a href="/product-detail.html?id=\${p.id}" class="related-card">
      <div class="related-img">
        \${p.image_url ? \`<img src="\${p.image_url}" alt="\${p.name}" onerror="this.style.display='none'">\` : ""}
        <span>\${getCategoryEmoji(p.category)}</span>
      </div>
      <div class="related-body">
        <div class="related-name">\${p.name}</div>
        <div class="related-price">\${formatPrice(p.price)}</div>
      </div>
    </a>\`).join("");
}

init();
</script>
</body>
</html>
