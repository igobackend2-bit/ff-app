<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — FF Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div id="toast-container"></div>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">FF Admin <span>Farmers Factory</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="products.html"  class="nav-link"><span class="nav-icon">🥦</span> Products</a>
      <a href="orders.html"    class="nav-link active"><span class="nav-icon">📦</span> Orders</a>
      <a href="customers.html" class="nav-link"><span class="nav-icon">👥</span> Customers</a>
    </nav>
    <div class="sidebar-footer">
      <div class="logout-btn" id="logout-btn">🚪 Logout</div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Orders</h1>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" id="refresh-btn">↻ Refresh</button>
      </div>
    </div>

    <div class="admin-content">
      <div class="filter-bar">
        <input type="text" id="search-orders" placeholder="Search by name or order ID…">
        <select id="filter-status">
          <option value="">All Statuses</option>
          <option value="placed">Placed</option>
          <option value="packing">Packing</option>
          <option value="out_for_delivery">Out for Delivery</option>
          <option value="delivered">Delivered</option>
        </select>
      </div>

      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Location</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Delivery Time</th>
              <th>Date</th>
            </tr></thead>
            <tbody id="orders-body">
              <tr><td colspan="10" style="text-align:center;padding:24px"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import {
  requireAdmin, logoutAdmin, showToast,
  fetchAllOrders, updateOrderStatus, updateDeliveryTime,
  subscribeToOrders, formatDate, statusBadge
} from '../js/admin.js';

if (!requireAdmin()) throw new Error('Not admin');
document.getElementById('logout-btn').addEventListener('click', logoutAdmin);

let orders = [];

async function loadOrders() {
  orders = await fetchAllOrders();
  renderTable(orders);
}

function renderTable(list) {
  const body = document.getElementById('orders-body');
  if (!list.length) {
    body.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-3);padding:24px">No orders found</td></tr>';
    return;
  }
  body.innerHTML = list.map(o => `
    <tr data-id="${o.id}">
      <td class="td-bold" style="font-size:11px">#${o.id.slice(0,8).toUpperCase()}</td>
      <td>${o.users?.name || '—'}</td>
      <td>${o.phone || '—'}</td>
      <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${o.product_name || '—'}</td>
      <td>${o.quantity}</td>
      <td style="max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-2)">${o.location || '—'}</td>
      <td class="text-primary">₹${o.total_price}</td>
      <td>
        <select class="status-select" data-id="${o.id}">
          <option value="placed"           ${o.status === 'placed'           ? 'selected' : ''}>📦 Placed</option>
          <option value="packing"          ${o.status === 'packing'          ? 'selected' : ''}>🧺 Packing</option>
          <option value="out_for_delivery" ${o.status === 'out_for_delivery' ? 'selected' : ''}>🚚 Out for Delivery</option>
          <option value="delivered"        ${o.status === 'delivered'        ? 'selected' : ''}>✅ Delivered</option>
        </select>
      </td>
      <td>
        <div style="display:flex;gap:4px;align-items:center">
          <input type="text" class="delivery-time-input" data-id="${o.id}"
            value="${o.delivery_time || ''}" placeholder="e.g. Today 6pm">
          <button class="btn btn-primary btn-sm save-time-btn" data-id="${o.id}">Save</button>
        </div>
      </td>
      <td class="text-muted">${formatDate(o.created_at)}</td>
    </tr>`).join('');

  // Status dropdown changes
  body.querySelectorAll('.status-select').forEach(sel => {
    sel.addEventListener('change', async () => {
      const { error } = await updateOrderStatus(sel.dataset.id, sel.value);
      if (error) { showToast('Status update failed', 'error'); return; }
      showToast('Status updated to: ' + sel.options[sel.selectedIndex].text, 'success');
    });
  });

  // Save delivery time
  body.querySelectorAll('.save-time-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const input = body.querySelector(`.delivery-time-input[data-id="${btn.dataset.id}"]`);
      const val   = input.value.trim();
      const { error } = await updateDeliveryTime(btn.dataset.id, val);
      if (error) { showToast('Update failed', 'error'); return; }
      showToast('Delivery time saved ✓', 'success');
    });
  });
}

function applyFilters() {
  const q   = document.getElementById('search-orders').value.toLowerCase();
  const s   = document.getElementById('filter-status').value;
  renderTable(orders.filter(o =>
    (!q || o.id.includes(q) || (o.users?.name || '').toLowerCase().includes(q) || (o.product_name || '').toLowerCase().includes(q)) &&
    (!s || o.status === s)
  ));
}

document.getElementById('search-orders').addEventListener('input', applyFilters);
document.getElementById('filter-status').addEventListener('change', applyFilters);
document.getElementById('refresh-btn').addEventListener('click', loadOrders);

// Realtime subscription
subscribeToOrders(() => loadOrders());

loadOrders();
</script>
</body>
</html>
