<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers — FF Admin</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div id="toast-container"></div>

<div class="admin-shell">
  <aside class="admin-sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">FF Admin <span>Farmers Factory</span></div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="products.html"  class="nav-link"><span class="nav-icon">🥦</span> Products</a>
      <a href="orders.html"    class="nav-link"><span class="nav-icon">📦</span> Orders</a>
      <a href="customers.html" class="nav-link active"><span class="nav-icon">👥</span> Customers</a>
    </nav>
    <div class="sidebar-footer">
      <div class="logout-btn" id="logout-btn">🚪 Logout</div>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Customers</h1>
      <div class="topbar-actions">
        <span id="customer-count" style="font-size:14px;color:var(--text-3);font-weight:600">—</span>
      </div>
    </div>

    <div class="admin-content">
      <div class="filter-bar">
        <input type="text" id="search-customers" placeholder="Search by name or email…">
      </div>

      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>#</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Joined Date</th>
              <th>Total Orders</th>
            </tr></thead>
            <tbody id="customers-body">
              <tr><td colspan="6" style="text-align:center;padding:24px"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script type="module">
import { requireAdmin, logoutAdmin, fetchAllCustomers, formatDate } from '../js/admin.js';

if (!requireAdmin()) throw new Error('Not admin');
document.getElementById('logout-btn').addEventListener('click', logoutAdmin);

let customers = [];

async function loadCustomers() {
  customers = await fetchAllCustomers();
  document.getElementById('customer-count').textContent = customers.length + ' customers';
  renderTable(customers);
}

function renderTable(list) {
  const body = document.getElementById('customers-body');
  if (!list.length) {
    body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-3);padding:24px">No customers yet</td></tr>';
    return;
  }
  body.innerHTML = list.map((c, i) => `
    <tr>
      <td class="text-muted">${i + 1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--primary-pale);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--primary)">
            ${c.name.split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase()}
          </div>
          <span class="td-bold">${c.name}</span>
        </div>
      </td>
      <td>${c.email}</td>
      <td>${c.phone || '—'}</td>
      <td class="text-muted">${formatDate(c.created_at)}</td>
      <td>
        <span style="font-weight:700;color:var(--primary)">${c.orderCount}</span>
        ${c.orderCount === 0 ? '<span class="text-muted"> (no orders)</span>' : ''}
      </td>
    </tr>`).join('');
}

document.getElementById('search-customers').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  renderTable(customers.filter(c =>
    c.name.toLowerCase().includes(q) || c.email.toLowerCase().includes(q)
  ));
});

loadCustomers();
</script>
</body>
</html>
