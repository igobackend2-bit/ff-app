<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Farmers Factory</title>
  <link rel="stylesheet" href="../css/app.css" />
</head>
<body>
<div id="toast-container"></div>

<!-- Admin Top Bar -->
<div class="admin-topbar">
  <div class="admin-topbar-logo">⚙️ FF Admin</div>
  <button class="btn-logout" onclick="adminLogout()">Log Out</button>
</div>

<div class="admin-page">

  <!-- Stats -->
  <h2 class="section-title">Overview</h2>
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-value" id="stat-users">—</div><div class="stat-label">Total Users</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-orders">—</div><div class="stat-label">Total Orders</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-products">—</div><div class="stat-label">Products</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-placed">—</div><div class="stat-label">Placed</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-packing">—</div><div class="stat-label">Packing</div></div>
    <div class="stat-card"><div class="stat-value" id="stat-delivered">—</div><div class="stat-label">Delivered</div></div>
  </div>

  <!-- Recent Orders -->
  <div class="data-section">
    <div class="data-section-header">
      <h2 class="section-title">Recent Orders</h2>
      <a href="orders.html" class="view-all-link">View All →</a>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="orders-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="6" class="table-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Recent Customers -->
  <div class="data-section">
    <div class="data-section-header">
      <h2 class="section-title">Recent Customers</h2>
      <a href="customers.html" class="view-all-link">View All →</a>
    </div>
    <div class="table-wrap">
      <table class="data-table" id="customers-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Joined</th>
          </tr>
        </thead>
        <tbody id="customers-body">
          <tr><td colspan="4" class="table-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- CDN Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script>
  // Auth guard
  if (localStorage.getItem('ff_admin') !== 'true') {
    window.location.replace('index.html');
  }

  function adminLogout() {
    localStorage.removeItem('ff_admin');
    window.location.href = 'index.html';
  }

  function fmtDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  }

  function statusBadge(status) {
    var cls = {
      placed: 'badge-placed',
      packing: 'badge-packing',
      'out for delivery': 'badge-delivery',
      delivered: 'badge-delivered'
    }[status] || 'badge-placed';
    return '<span class="badge ' + cls + '">' + (status || 'placed') + '</span>';
  }

  async function loadStats() {
    try {
      var [users, orders, products] = await Promise.all([
        window.db.from('users').select('id', { count: 'exact', head: true }),
        window.db.from('orders').select('id, status', { count: 'exact' }),
        window.db.from('products').select('id', { count: 'exact', head: true })
      ]);

      document.getElementById('stat-users').textContent    = users.count    ?? '—';
      document.getElementById('stat-orders').textContent   = orders.count   ?? '—';
      document.getElementById('stat-products').textContent = products.count ?? '—';

      if (orders.data) {
        var placed    = orders.data.filter(function(o){ return o.status === 'placed'; }).length;
        var packing   = orders.data.filter(function(o){ return o.status === 'packing'; }).length;
        var delivered = orders.data.filter(function(o){ return o.status === 'delivered'; }).length;
        document.getElementById('stat-placed').textContent    = placed;
        document.getElementById('stat-packing').textContent   = packing;
        document.getElementById('stat-delivered').textContent = delivered;
      }
    } catch(e) {
      console.error('Stats load error', e);
    }
  }

  async function loadRecentOrders() {
    try {
      var res = await window.db.from('orders')
        .select('id, total_amount, status, created_at, users(name)')
        .order('created_at', { ascending: false })
        .limit(10);

      var tbody = document.getElementById('orders-body');
      if (!res.data || res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="table-empty">No orders yet.</td></tr>';
        return;
      }

      tbody.innerHTML = res.data.map(function(o) {
        var shortId = String(o.id).slice(0, 8).toUpperCase();
        var customer = (o.users && o.users.name) ? o.users.name : '—';
        var amount = o.total_amount ? '₹' + Number(o.total_amount).toFixed(2) : '—';
        return '<tr>' +
          '<td><code>#' + shortId + '</code></td>' +
          '<td>' + customer + '</td>' +
          '<td>' + amount + '</td>' +
          '<td>' + statusBadge(o.status) + '</td>' +
          '<td>' + fmtDate(o.created_at) + '</td>' +
          '<td><a href="orders.html?id=' + o.id + '" class="table-link">View</a></td>' +
        '</tr>';
      }).join('');
    } catch(e) {
      document.getElementById('orders-body').innerHTML =
        '<tr><td colspan="6" class="table-empty">Failed to load orders.</td></tr>';
    }
  }

  async function loadRecentCustomers() {
    try {
      var res = await window.db.from('users')
        .select('id, name, email, phone, created_at')
        .order('created_at', { ascending: false })
        .limit(10);

      var tbody = document.getElementById('customers-body');
      if (!res.data || res.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="table-empty">No customers yet.</td></tr>';
        return;
      }

      tbody.innerHTML = res.data.map(function(u) {
        return '<tr>' +
          '<td>' + (u.name || '—') + '</td>' +
          '<td>' + (u.email || '—') + '</td>' +
          '<td>' + (u.phone || '—') + '</td>' +
          '<td>' + fmtDate(u.created_at) + '</td>' +
        '</tr>';
      }).join('');
    } catch(e) {
      document.getElementById('customers-body').innerHTML =
        '<tr><td colspan="4" class="table-empty">Failed to load customers.</td></tr>';
    }
  }

  // Init
  window.addEventListener('load', function() {
    loadStats();
    loadRecentOrders();
    loadRecentCustomers();
  });
</script>
</body>
</html>
