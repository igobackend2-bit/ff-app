<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My Orders — Farmers Factory</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="toast-container"></div>
<div class="app-wrapper">
  <header class="page-header">
    <a href="index.html" class="back-btn">←</a>
    <h1 class="page-title">My Orders</h1>
    <a href="cart.html" class="icon-btn">🛒<span class="badge cart-badge" style="display:none">0</span></a>
  </header>

  <div id="orders-container" class="p-16"></div>
</div>

<nav class="bottom-nav">
  <a href="index.html"   class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="wishlist.html" class="nav-item"><span class="nav-icon">🤍</span><span>Wishlist</span></a>
  <a href="cart.html"    class="nav-item"><span class="nav-icon">🛒</span><span>Cart</span></a>
  <a href="orders.html"  class="nav-item active"><span class="nav-icon">📦</span><span>Orders</span></a>
  <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
</nav>

<script type="module">
import { fetchMyOrders, subscribeToOrders, statusBadge, formatDate } from './js/orders.js';
import { requireAuth } from './js/auth.js';
import { syncBadges } from './js/cart.js';

syncBadges();
const user = requireAuth();
if (!user) throw new Error('Not authenticated');

async function loadOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

  const orders = await fetchMyOrders();

  if (!orders.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <h3>No orders yet</h3>
        <p>Place your first order to see it here</p>
        <a href="index.html" class="btn btn-primary mt-16">Shop Now</a>
      </div>`;
    return;
  }

  container.innerHTML = orders.map(o => `
    <div class="card" style="margin:0 0 12px">
      <div class="flex-between" style="margin-bottom:8px">
        <span style="font-size:11px;color:var(--text-3);font-weight:700">
          #${o.id.slice(0,8).toUpperCase()}
        </span>
        ${statusBadge(o.status)}
      </div>
      <div style="font-weight:700;font-size:15px;margin-bottom:3px">${o.product_name}</div>
      <div style="font-size:12px;color:var(--text-3);margin-bottom:8px">
        Qty: ${o.quantity} · ${formatDate(o.created_at)}
      </div>
      <div style="font-size:13px;color:var(--text-2);margin-bottom:4px">
        📍 ${o.location}
      </div>
      ${o.delivery_time
        ? `<div style="font-size:13px;color:var(--primary);font-weight:700;margin-bottom:4px">
             🚚 Delivery: ${o.delivery_time}
           </div>`
        : `<div style="font-size:12px;color:var(--text-3)">🚚 Expected within 24 hours</div>`}
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bg);font-size:16px;font-weight:800;color:var(--primary)">
        ₹${o.total_price}
      </div>
    </div>`).join('');
}

loadOrders();

// Auto-refresh every 30 seconds
setInterval(loadOrders, 30_000);

// Realtime subscription
subscribeToOrders(user.id, loadOrders);
</script>
</body>
</html>
